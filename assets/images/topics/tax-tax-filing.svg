<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFF1F2" rx="10"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#E11D48">Tax Filing &amp; Compliance</text>

  <!-- Filing Cabinet -->
  <rect x="30" y="50" width="100" height="160" fill="#E11D48" rx="6"/>
  <!-- Drawer 1 -->
  <rect x="38" y="58" width="84" height="45" fill="#9F1239" rx="3"/>
  <rect x="68" y="76" width="24" height="6" fill="#FECDD3" rx="2"/>
  <text x="80" y="72" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FECDD3">2024</text>
  <!-- Drawer 2 -->
  <rect x="38" y="108" width="84" height="45" fill="#9F1239" rx="3"/>
  <rect x="68" y="126" width="24" height="6" fill="#FECDD3" rx="2"/>
  <text x="80" y="122" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FECDD3">2025</text>
  <!-- Drawer 3 (open) -->
  <rect x="38" y="158" width="84" height="45" fill="#BE123C" rx="3"/>
  <rect x="32" y="162" width="96" height="38" fill="white" stroke="#E11D48" stroke-width="1.5" rx="3"/>
  <rect x="40" y="168" width="40" height="4" fill="#FDA4AF" rx="1"/>
  <rect x="40" y="176" width="50" height="4" fill="#FDA4AF" rx="1"/>
  <rect x="40" y="184" width="35" height="4" fill="#FDA4AF" rx="1"/>
  <rect x="68" y="192" width="24" height="6" fill="#FECDD3" rx="2"/>
  <text x="80" y="172" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FECDD3">2026</text>
  <text x="80" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E11D48">Filing Cabinet</text>

  <!-- Document with checkmarks -->
  <rect x="155" y="45" width="120" height="165" fill="white" stroke="#E11D48" stroke-width="2" rx="6"/>
  <!-- Document header -->
  <rect x="155" y="45" width="120" height="28" fill="#E11D48" rx="6"/>
  <rect x="155" y="60" width="120" height="13" fill="#E11D48"/>
  <text x="215" y="64" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">TAX RETURN</text>

  <!-- Checklist items -->
  <rect x="168" y="84" width="14" height="14" fill="#FECDD3" rx="2" stroke="#FB7185" stroke-width="1"/>
  <path d="M171,91 L174,95 L180,87" stroke="#E11D48" stroke-width="2" fill="none"/>
  <text x="188" y="95" font-family="sans-serif" font-size="9" fill="#4B5563">Income reported</text>

  <rect x="168" y="106" width="14" height="14" fill="#FECDD3" rx="2" stroke="#FB7185" stroke-width="1"/>
  <path d="M171,113 L174,117 L180,109" stroke="#E11D48" stroke-width="2" fill="none"/>
  <text x="188" y="117" font-family="sans-serif" font-size="9" fill="#4B5563">Deductions calc.</text>

  <rect x="168" y="128" width="14" height="14" fill="#FECDD3" rx="2" stroke="#FB7185" stroke-width="1"/>
  <path d="M171,135 L174,139 L180,131" stroke="#E11D48" stroke-width="2" fill="none"/>
  <text x="188" y="139" font-family="sans-serif" font-size="9" fill="#4B5563">Credits applied</text>

  <rect x="168" y="150" width="14" height="14" fill="#FECDD3" rx="2" stroke="#FB7185" stroke-width="1"/>
  <path d="M171,157 L174,161 L180,153" stroke="#E11D48" stroke-width="2" fill="none"/>
  <text x="188" y="161" font-family="sans-serif" font-size="9" fill="#4B5563">Tax computed</text>

  <rect x="168" y="172" width="14" height="14" fill="white" rx="2" stroke="#FB7185" stroke-width="1"/>
  <text x="188" y="183" font-family="sans-serif" font-size="9" fill="#9CA3AF">Submitted</text>

  <!-- Stamp -->
  <rect x="185" y="192" width="60" height="14" fill="#FB7185" rx="3"/>
  <text x="215" y="203" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">IN PROGRESS</text>

  <!-- Calendar -->
  <rect x="300" y="45" width="85" height="90" fill="white" stroke="#FB7185" stroke-width="2" rx="6"/>
  <rect x="300" y="45" width="85" height="24" fill="#E11D48" rx="6"/>
  <rect x="300" y="58" width="85" height="11" fill="#E11D48"/>
  <text x="342" y="62" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">MARCH 2026</text>

  <!-- Calendar grid -->
  <text x="310" y="82" font-family="sans-serif" font-size="7" fill="#6B7280">S</text>
  <text x="322" y="82" font-family="sans-serif" font-size="7" fill="#6B7280">M</text>
  <text x="334" y="82" font-family="sans-serif" font-size="7" fill="#6B7280">T</text>
  <text x="346" y="82" font-family="sans-serif" font-size="7" fill="#6B7280">W</text>
  <text x="358" y="82" font-family="sans-serif" font-size="7" fill="#6B7280">T</text>
  <text x="370" y="82" font-family="sans-serif" font-size="7" fill="#6B7280">F</text>

  <!-- Calendar dates row 1 -->
  <text x="310" y="94" font-family="sans-serif" font-size="8" fill="#6B7280">1</text>
  <text x="322" y="94" font-family="sans-serif" font-size="8" fill="#6B7280">2</text>
  <text x="334" y="94" font-family="sans-serif" font-size="8" fill="#6B7280">3</text>
  <text x="346" y="94" font-family="sans-serif" font-size="8" fill="#6B7280">4</text>
  <text x="358" y="94" font-family="sans-serif" font-size="8" fill="#6B7280">5</text>
  <text x="370" y="94" font-family="sans-serif" font-size="8" fill="#6B7280">6</text>

  <!-- Calendar dates row 2 -->
  <text x="310" y="106" font-family="sans-serif" font-size="8" fill="#6B7280">8</text>
  <text x="322" y="106" font-family="sans-serif" font-size="8" fill="#6B7280">9</text>
  <text x="334" y="106" font-family="sans-serif" font-size="8" fill="#6B7280">10</text>
  <text x="346" y="106" font-family="sans-serif" font-size="8" fill="#6B7280">11</text>
  <text x="358" y="106" font-family="sans-serif" font-size="8" fill="#6B7280">12</text>
  <text x="370" y="106" font-family="sans-serif" font-size="8" fill="#6B7280">13</text>

  <!-- Calendar dates row 3 - deadline highlighted -->
  <text x="310" y="118" font-family="sans-serif" font-size="8" fill="#6B7280">15</text>
  <text x="322" y="118" font-family="sans-serif" font-size="8" fill="#6B7280">16</text>
  <text x="334" y="118" font-family="sans-serif" font-size="8" fill="#6B7280">17</text>
  <text x="346" y="118" font-family="sans-serif" font-size="8" fill="#6B7280">18</text>
  <text x="358" y="118" font-family="sans-serif" font-size="8" fill="#6B7280">19</text>
  <text x="370" y="118" font-family="sans-serif" font-size="8" fill="#6B7280">20</text>

  <!-- Deadline marker -->
  <circle cx="370" cy="128" r="8" fill="#E11D48"/>
  <text x="370" y="131" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="white">31</text>

  <text x="342" y="148" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Deadline: 3/31</text>

  <!-- Timeline at bottom -->
  <rect x="20" y="170" width="360" height="110" fill="white" stroke="#FB7185" stroke-width="1.5" rx="8"/>
  <text x="200" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#E11D48">Filing Timeline</text>

  <!-- Timeline line -->
  <line x1="40" y1="220" x2="360" y2="220" stroke="#FDA4AF" stroke-width="3" stroke-linecap="round"/>

  <!-- Timeline points -->
  <circle cx="60" cy="220" r="8" fill="#E11D48"/>
  <text x="60" y="224" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="white">1</text>
  <text x="60" y="240" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4B5563">Prepare</text>
  <text x="60" y="252" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">Documents</text>

  <circle cx="140" cy="220" r="8" fill="#E11D48"/>
  <text x="140" y="224" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="white">2</text>
  <text x="140" y="240" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4B5563">Calculate</text>
  <text x="140" y="252" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">Tax Amount</text>

  <circle cx="220" cy="220" r="8" fill="#E11D48"/>
  <text x="220" y="224" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="white">3</text>
  <text x="220" y="240" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4B5563">Review</text>
  <text x="220" y="252" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">Verify Data</text>

  <circle cx="300" cy="220" r="8" fill="#FB7185"/>
  <text x="300" y="224" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="white">4</text>
  <text x="300" y="240" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4B5563">Submit</text>
  <text x="300" y="252" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">E-Filing</text>

  <circle cx="350" cy="220" r="8" fill="#FB7185"/>
  <text x="350" y="224" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="white">5</text>
  <text x="350" y="240" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4B5563">Pay</text>
  <text x="350" y="252" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">Settlement</text>

  <!-- Arrow connectors on timeline -->
  <polygon points="90,220 84,216 84,224" fill="#E11D48"/>
  <polygon points="170,220 164,216 164,224" fill="#E11D48"/>
  <polygon points="250,220 244,216 244,224" fill="#E11D48"/>
  <polygon points="330,220 324,216 324,224" fill="#E11D48"/>
</svg>
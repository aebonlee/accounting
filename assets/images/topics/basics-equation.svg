<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#F0F5FF" rx="10"/>

  <!-- Title -->
  <text x="200" y="38" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1D4ED8" text-anchor="middle">The Accounting Equation</text>

  <!-- Assets Block -->
  <rect x="20" y="70" width="110" height="120" fill="#1D4ED8" rx="10"/>
  <rect x="28" y="78" width="94" height="40" fill="#FFFFFF" rx="6" opacity="0.2"/>
  <text x="75" y="105" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Assets</text>
  <text x="75" y="132" font-family="sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">A</text>
  <!-- Asset icons -->
  <rect x="40" y="155" width="28" height="22" fill="#93C5FD" rx="4"/>
  <text x="54" y="172" font-family="sans-serif" font-size="14" fill="#1D4ED8" text-anchor="middle">$</text>
  <rect x="76" y="155" width="28" height="22" fill="#93C5FD" rx="4"/>
  <rect x="82" y="160" width="16" height="12" fill="#FFFFFF" rx="2"/>

  <!-- Equals Sign -->
  <text x="155" y="140" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1D4ED8" text-anchor="middle">=</text>

  <!-- Liabilities Block -->
  <rect x="180" y="70" width="100" height="120" fill="#3B82F6" rx="10"/>
  <rect x="188" y="78" width="84" height="40" fill="#FFFFFF" rx="6" opacity="0.2"/>
  <text x="230" y="100" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Liabilities</text>
  <text x="230" y="132" font-family="sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">L</text>
  <!-- Liability icon -->
  <rect x="208" y="155" width="44" height="22" fill="#93C5FD" rx="4"/>
  <text x="230" y="171" font-family="sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle">Debt</text>

  <!-- Plus Sign -->
  <text x="302" y="140" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1D4ED8" text-anchor="middle">+</text>

  <!-- Equity Block -->
  <rect x="322" y="70" width="60" height="120" fill="#93C5FD" rx="10"/>
  <rect x="328" y="78" width="48" height="40" fill="#FFFFFF" rx="6" opacity="0.2"/>
  <text x="352" y="100" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Equity</text>
  <text x="352" y="132" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1D4ED8" text-anchor="middle">E</text>
  <!-- Equity icon -->
  <rect x="335" y="155" width="34" height="22" fill="#1D4ED8" rx="4"/>
  <text x="352" y="171" font-family="sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">Own</text>

  <!-- Full equation text -->
  <rect x="40" y="210" width="320" height="40" fill="#DBEAFE" rx="8"/>
  <text x="200" y="236" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Assets = Liabilities + Equity</text>

  <!-- Arrow showing relationship -->
  <path d="M75 195 L75 210" fill="none" stroke="#1D4ED8" stroke-width="2"/>
  <path d="M230 195 L230 210" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <path d="M352 195 L352 210" fill="none" stroke="#93C5FD" stroke-width="2"/>

  <!-- Bottom examples -->
  <text x="75" y="272" font-family="sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle">Cash, Equipment</text>
  <text x="75" y="286" font-family="sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle">Inventory</text>

  <text x="230" y="272" font-family="sans-serif" font-size="10" fill="#3B82F6" text-anchor="middle">Loans, Payables</text>
  <text x="230" y="286" font-family="sans-serif" font-size="10" fill="#3B82F6" text-anchor="middle">Bonds</text>

  <text x="352" y="272" font-family="sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle">Capital</text>
  <text x="352" y="286" font-family="sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle">Retained Earn.</text>
</svg>
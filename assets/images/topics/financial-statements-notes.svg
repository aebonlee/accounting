<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#F0FDF4" rx="8"/>

  <!-- Title -->
  <text x="200" y="28" font-family="sans-serif" font-size="15" fill="#059669" text-anchor="middle" font-weight="bold">Notes &amp; Disclosures</text>

  <!-- Document body -->
  <rect x="60" y="45" width="200" height="230" fill="white" stroke="#059669" stroke-width="2" rx="6"/>

  <!-- Document header -->
  <rect x="60" y="45" width="200" height="30" fill="#059669" rx="6"/>
  <rect x="60" y="65" width="200" height="10" fill="#059669"/>
  <text x="160" y="66" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Notes to Financial Statements</text>

  <!-- Document text lines -->
  <rect x="78" y="90" width="140" height="5" fill="#059669" opacity="0.3" rx="1"/>
  <rect x="78" y="102" width="160" height="5" fill="#059669" opacity="0.3" rx="1"/>
  <rect x="78" y="114" width="120" height="5" fill="#059669" opacity="0.3" rx="1"/>

  <!-- Highlighted annotation section -->
  <rect x="74" y="130" width="170" height="24" fill="#6EE7B7" opacity="0.3" rx="3"/>
  <rect x="78" y="136" width="155" height="5" fill="#059669" opacity="0.5" rx="1"/>
  <rect x="78" y="146" width="130" height="5" fill="#059669" opacity="0.5" rx="1"/>

  <!-- More text lines -->
  <rect x="78" y="165" width="150" height="5" fill="#059669" opacity="0.3" rx="1"/>
  <rect x="78" y="177" width="165" height="5" fill="#059669" opacity="0.3" rx="1"/>
  <rect x="78" y="189" width="110" height="5" fill="#059669" opacity="0.3" rx="1"/>

  <!-- Another highlighted section -->
  <rect x="74" y="205" width="170" height="24" fill="#6EE7B7" opacity="0.3" rx="3"/>
  <rect x="78" y="211" width="140" height="5" fill="#059669" opacity="0.5" rx="1"/>
  <rect x="78" y="223" width="155" height="5" fill="#059669" opacity="0.5" rx="1"/>

  <!-- More text -->
  <rect x="78" y="242" width="130" height="5" fill="#059669" opacity="0.3" rx="1"/>
  <rect x="78" y="254" width="150" height="5" fill="#059669" opacity="0.3" rx="1"/>

  <!-- Magnifying glass -->
  <circle cx="310" cy="140" r="45" fill="white" stroke="#059669" stroke-width="4"/>
  <circle cx="310" cy="140" r="38" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <rect x="340" y="170" width="12" height="50" fill="#059669" rx="4" transform="rotate(45, 346, 195)"/>

  <!-- Inside magnifying glass - zoomed text -->
  <rect x="285" y="125" width="50" height="4" fill="#059669" rx="1"/>
  <rect x="285" y="135" width="45" height="4" fill="#059669" rx="1"/>
  <rect x="285" y="145" width="50" height="4" fill="#6EE7B7" rx="1"/>
  <rect x="285" y="155" width="38" height="4" fill="#059669" rx="1"/>

  <!-- Annotation marks / pointers -->
  <circle cx="248" cy="140" r="8" fill="#6EE7B7" stroke="#059669" stroke-width="2"/>
  <text x="248" y="144" font-family="sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="bold">!</text>

  <circle cx="270" cy="95" r="8" fill="#6EE7B7" stroke="#059669" stroke-width="2"/>
  <text x="270" y="99" font-family="sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="bold">*</text>

  <circle cx="290" cy="210" r="8" fill="#6EE7B7" stroke="#059669" stroke-width="2"/>
  <text x="290" y="214" font-family="sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="bold">#</text>

  <!-- Connector lines from annotations to document -->
  <line x1="240" y1="140" x2="230" y2="140" stroke="#059669" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="262" y1="95" x2="230" y2="102" stroke="#059669" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="282" y1="210" x2="244" y2="215" stroke="#059669" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Bottom label -->
  <text x="200" y="290" font-family="sans-serif" font-size="11" fill="#059669" text-anchor="middle">Detailed explanations and supplementary information</text>
</svg>
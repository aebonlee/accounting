<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" rx="12" fill="#FFFBEB"/>
  <!-- Decision tree trunk -->
  <circle cx="200" cy="40" r="24" fill="#F59E0B"/>
  <text x="200" y="44" font-family="sans-serif" font-size="10" fill="white" font-weight="bold" text-anchor="middle">Invest?</text>
  <!-- Branch lines from root -->
  <line x1="182" y1="58" x2="110" y2="110" stroke="#D97706" stroke-width="2.5"/>
  <line x1="218" y1="58" x2="290" y2="110" stroke="#D97706" stroke-width="2.5"/>
  <!-- Left branch: Project A -->
  <rect x="65" y="100" width="90" height="36" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
  <text x="110" y="122" font-family="sans-serif" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">Project A</text>
  <!-- Right branch: Project B -->
  <rect x="245" y="100" width="90" height="36" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
  <text x="290" y="122" font-family="sans-serif" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">Project B</text>
  <!-- Project A sub-branches -->
  <line x1="95" y1="136" x2="60" y2="175" stroke="#FBBF24" stroke-width="2"/>
  <line x1="125" y1="136" x2="160" y2="175" stroke="#FBBF24" stroke-width="2"/>
  <!-- Project A - NPV -->
  <rect x="20" y="170" width="80" height="55" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <text x="60" y="188" font-family="sans-serif" font-size="10" fill="#92400E" font-weight="bold" text-anchor="middle">NPV</text>
  <text x="60" y="204" font-family="sans-serif" font-size="14" fill="#16A34A" font-weight="bold" text-anchor="middle">+$2.4M</text>
  <circle cx="60" cy="218" r="4" fill="#16A34A"/>
  <!-- Project A - IRR -->
  <rect x="120" y="170" width="80" height="55" rx="8" fill="white" stroke="#FBBF24" stroke-width="2"/>
  <text x="160" y="188" font-family="sans-serif" font-size="10" fill="#92400E" font-weight="bold" text-anchor="middle">IRR</text>
  <text x="160" y="204" font-family="sans-serif" font-size="14" fill="#16A34A" font-weight="bold" text-anchor="middle">18.5%</text>
  <circle cx="160" cy="218" r="4" fill="#16A34A"/>
  <!-- Project B sub-branches -->
  <line x1="275" y1="136" x2="240" y2="175" stroke="#FBBF24" stroke-width="2"/>
  <line x1="305" y1="136" x2="340" y2="175" stroke="#FBBF24" stroke-width="2"/>
  <!-- Project B - NPV -->
  <rect x="200" y="170" width="80" height="55" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <text x="240" y="188" font-family="sans-serif" font-size="10" fill="#92400E" font-weight="bold" text-anchor="middle">NPV</text>
  <text x="240" y="204" font-family="sans-serif" font-size="14" fill="#DC2626" font-weight="bold" text-anchor="middle">-$0.3M</text>
  <circle cx="240" cy="218" r="4" fill="#DC2626"/>
  <!-- Project B - IRR -->
  <rect x="300" y="170" width="80" height="55" rx="8" fill="white" stroke="#FBBF24" stroke-width="2"/>
  <text x="340" y="188" font-family="sans-serif" font-size="10" fill="#92400E" font-weight="bold" text-anchor="middle">IRR</text>
  <text x="340" y="204" font-family="sans-serif" font-size="14" fill="#DC2626" font-weight="bold" text-anchor="middle">7.2%</text>
  <circle cx="340" cy="218" r="4" fill="#DC2626"/>
  <!-- Decision indicator -->
  <rect x="100" y="245" width="200" height="40" rx="10" fill="#F59E0B"/>
  <text x="200" y="262" font-family="sans-serif" font-size="11" fill="white" font-weight="bold" text-anchor="middle">Accept Project A (NPV &gt; 0)</text>
  <text x="200" y="277" font-family="sans-serif" font-size="10" fill="#FEFCE8" text-anchor="middle">Hurdle Rate: 12%</text>
  <!-- Checkmark on A -->
  <circle cx="60" cy="145" r="10" fill="#16A34A"/>
  <polyline points="54,145 58,150 67,140" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- X on B -->
  <circle cx="340" cy="145" r="10" fill="#DC2626"/>
  <line x1="335" y1="140" x2="345" y2="150" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="345" y1="140" x2="335" y2="150" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFF7ED" rx="8"/>

  <!-- Title -->
  <text x="200" y="28" font-family="sans-serif" font-size="16" fill="#92400E" text-anchor="middle" font-weight="bold">Activity-Based Costing</text>

  <!-- Resources Row (Top) -->
  <text x="200" y="50" font-family="sans-serif" font-size="10" fill="#B45309" text-anchor="middle" font-weight="bold">Overhead Resources</text>

  <rect x="30" y="56" width="100" height="28" fill="#D97706" rx="4"/>
  <text x="80" y="74" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Salaries $50K</text>

  <rect x="150" y="56" width="100" height="28" fill="#D97706" rx="4"/>
  <text x="200" y="74" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Utilities $30K</text>

  <rect x="270" y="56" width="100" height="28" fill="#D97706" rx="4"/>
  <text x="320" y="74" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Deprec. $40K</text>

  <!-- Arrows from Resources to Activity Pools -->
  <!-- From Salaries -->
  <line x1="60" y1="84" x2="60" y2="130" stroke="#D97706" stroke-width="1.5"/>
  <line x1="100" y1="84" x2="200" y2="130" stroke="#D97706" stroke-width="1"/>
  <!-- From Utilities -->
  <line x1="180" y1="84" x2="60" y2="130" stroke="#FDE68A" stroke-width="1"/>
  <line x1="200" y1="84" x2="200" y2="130" stroke="#FDE68A" stroke-width="1.5"/>
  <line x1="220" y1="84" x2="340" y2="130" stroke="#FDE68A" stroke-width="1"/>
  <!-- From Depreciation -->
  <line x1="300" y1="84" x2="200" y2="130" stroke="#D97706" stroke-width="1"/>
  <line x1="340" y1="84" x2="340" y2="130" stroke="#D97706" stroke-width="1.5"/>

  <!-- Activity Pools Row (Middle) -->
  <text x="200" y="123" font-family="sans-serif" font-size="10" fill="#B45309" text-anchor="middle" font-weight="bold">Activity Cost Pools</text>

  <rect x="10" y="130" width="100" height="44" fill="#FDE68A" rx="6"/>
  <text x="60" y="149" font-family="sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="bold">Machine Setup</text>
  <text x="60" y="163" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">$35,000</text>
  <text x="60" y="172" font-family="sans-serif" font-size="7" fill="#B45309" text-anchor="middle"># of setups</text>

  <rect x="150" y="130" width="100" height="44" fill="#FDE68A" rx="6"/>
  <text x="200" y="149" font-family="sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="bold">Quality Inspect.</text>
  <text x="200" y="163" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">$45,000</text>
  <text x="200" y="172" font-family="sans-serif" font-size="7" fill="#B45309" text-anchor="middle"># of inspections</text>

  <rect x="290" y="130" width="100" height="44" fill="#FDE68A" rx="6"/>
  <text x="340" y="149" font-family="sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="bold">Material Handling</text>
  <text x="340" y="163" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">$40,000</text>
  <text x="340" y="172" font-family="sans-serif" font-size="7" fill="#B45309" text-anchor="middle"># of orders</text>

  <!-- Arrows from Activity Pools to Cost Objects -->
  <!-- To Product A -->
  <line x1="40" y1="174" x2="100" y2="218" stroke="#D97706" stroke-width="1.5"/>
  <line x1="180" y1="174" x2="100" y2="218" stroke="#D97706" stroke-width="1"/>
  <line x1="320" y1="174" x2="100" y2="218" stroke="#D97706" stroke-width="1"/>

  <!-- To Product B -->
  <line x1="60" y1="174" x2="200" y2="218" stroke="#D97706" stroke-width="1"/>
  <line x1="200" y1="174" x2="200" y2="218" stroke="#D97706" stroke-width="1.5"/>
  <line x1="340" y1="174" x2="200" y2="218" stroke="#D97706" stroke-width="1"/>

  <!-- To Product C -->
  <line x1="80" y1="174" x2="300" y2="218" stroke="#D97706" stroke-width="1"/>
  <line x1="220" y1="174" x2="300" y2="218" stroke="#D97706" stroke-width="1"/>
  <line x1="360" y1="174" x2="300" y2="218" stroke="#D97706" stroke-width="1.5"/>

  <!-- Cost Objects Row (Bottom) -->
  <text x="200" y="212" font-family="sans-serif" font-size="10" fill="#B45309" text-anchor="middle" font-weight="bold">Cost Objects</text>

  <rect x="50" y="218" width="100" height="50" fill="#D97706" rx="6"/>
  <text x="100" y="239" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Product A</text>
  <text x="100" y="255" font-family="sans-serif" font-size="9" fill="#FDE68A" text-anchor="middle">OH: $38,000</text>

  <rect x="150" y="218" width="100" height="50" fill="#D97706" rx="6"/>
  <text x="200" y="239" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Product B</text>
  <text x="200" y="255" font-family="sans-serif" font-size="9" fill="#FDE68A" text-anchor="middle">OH: $52,000</text>

  <rect x="250" y="218" width="100" height="50" fill="#D97706" rx="6"/>
  <text x="300" y="239" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Product C</text>
  <text x="300" y="255" font-family="sans-serif" font-size="9" fill="#FDE68A" text-anchor="middle">OH: $30,000</text>

  <!-- Key insight -->
  <rect x="50" y="276" width="300" height="18" fill="#FBBF24" rx="4"/>
  <text x="200" y="289" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle" font-weight="bold">More accurate costing by tracing overhead to activities that cause costs</text>
</svg>
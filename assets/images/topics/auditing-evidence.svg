<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#ECFDF5" rx="12"/>

  <!-- Background decorations -->
  <circle cx="50" cy="45" r="18" fill="#D1FAE5"/>
  <rect x="340" y="30" width="30" height="30" fill="#D1FAE5" rx="4" transform="rotate(20 355 45)"/>
  <circle cx="370" cy="250" r="15" fill="#D1FAE5"/>

  <!-- Document stack - bottom layer -->
  <rect x="80" y="60" width="140" height="180" fill="#E8F5E9" rx="5" stroke="#A7F3D0" stroke-width="1.5"/>
  <!-- Document stack - middle layer -->
  <rect x="70" y="50" width="140" height="180" fill="#F0FDF4" rx="5" stroke="#A7F3D0" stroke-width="1.5"/>
  <!-- Document stack - top layer -->
  <rect x="60" y="40" width="140" height="180" fill="#FFFFFF" rx="5" stroke="#10B981" stroke-width="2"/>

  <!-- Top document content -->
  <text x="130" y="68" font-family="sans-serif" font-size="11" font-weight="bold" fill="#10B981" text-anchor="middle">EVIDENCE</text>
  <line x1="80" y1="76" x2="180" y2="76" stroke="#A7F3D0" stroke-width="1"/>

  <!-- Document lines -->
  <line x1="80" y1="90" x2="175" y2="90" stroke="#D1FAE5" stroke-width="2"/>
  <line x1="80" y1="104" x2="170" y2="104" stroke="#D1FAE5" stroke-width="2"/>
  <line x1="80" y1="118" x2="175" y2="118" stroke="#D1FAE5" stroke-width="2"/>
  <line x1="80" y1="132" x2="160" y2="132" stroke="#D1FAE5" stroke-width="2"/>
  <line x1="80" y1="146" x2="172" y2="146" stroke="#D1FAE5" stroke-width="2"/>
  <line x1="80" y1="160" x2="165" y2="160" stroke="#D1FAE5" stroke-width="2"/>

  <!-- Checkmarks on document -->
  <circle cx="85" cy="182" r="8" fill="#10B981"/>
  <polyline points="80,182 84,187 92,177" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="100" y="186" font-family="sans-serif" font-size="9" fill="#10B981">Verified</text>

  <!-- Evidence types on the right side -->
  <!-- Physical Evidence -->
  <rect x="230" y="35" width="140" height="42" fill="#FFFFFF" rx="6" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="252" cy="56" r="12" fill="#10B981"/>
  <rect x="247" y="49" width="10" height="14" fill="#FFFFFF" rx="1"/>
  <text x="275" y="52" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981">Physical</text>
  <text x="275" y="64" font-family="sans-serif" font-size="9" fill="#6B7280">Inspection, Count</text>

  <!-- Documentary Evidence -->
  <rect x="230" y="87" width="140" height="42" fill="#FFFFFF" rx="6" stroke="#A7F3D0" stroke-width="1.5"/>
  <circle cx="252" cy="108" r="12" fill="#A7F3D0"/>
  <rect x="246" y="101" width="12" height="14" fill="#FFFFFF" rx="1"/>
  <line x1="249" y1="106" x2="255" y2="106" stroke="#A7F3D0" stroke-width="1"/>
  <line x1="249" y1="110" x2="255" y2="110" stroke="#A7F3D0" stroke-width="1"/>
  <text x="275" y="104" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981">Documentary</text>
  <text x="275" y="116" font-family="sans-serif" font-size="9" fill="#6B7280">Invoices, Records</text>

  <!-- Analytical Evidence -->
  <rect x="230" y="139" width="140" height="42" fill="#FFFFFF" rx="6" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="252" cy="160" r="12" fill="#10B981"/>
  <!-- Mini bar chart icon -->
  <rect x="245" y="162" width="4" height="8" fill="#FFFFFF"/>
  <rect x="250" y="157" width="4" height="13" fill="#FFFFFF"/>
  <rect x="255" y="154" width="4" height="16" fill="#FFFFFF"/>
  <text x="275" y="156" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981">Analytical</text>
  <text x="275" y="168" font-family="sans-serif" font-size="9" fill="#6B7280">Ratios, Trends</text>

  <!-- Testimonial Evidence -->
  <rect x="230" y="191" width="140" height="42" fill="#FFFFFF" rx="6" stroke="#A7F3D0" stroke-width="1.5"/>
  <circle cx="252" cy="212" r="12" fill="#A7F3D0"/>
  <!-- Speech bubble icon -->
  <rect x="245" y="205" width="14" height="10" fill="#FFFFFF" rx="2"/>
  <polygon points="249,215 252,219 255,215" fill="#FFFFFF"/>
  <text x="275" y="208" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981">Testimonial</text>
  <text x="275" y="220" font-family="sans-serif" font-size="9" fill="#6B7280">Inquiry, Confirm</text>

  <!-- Connecting lines from stack to evidence types -->
  <line x1="200" y1="80" x2="228" y2="56" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="200" y1="110" x2="228" y2="108" stroke="#A7F3D0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="200" y1="140" x2="228" y2="160" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="200" y1="170" x2="228" y2="212" stroke="#A7F3D0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Large checkmark at bottom-left -->
  <circle cx="100" cy="250" r="16" fill="#10B981"/>
  <polyline points="90,250 97,258 112,243" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="200" y="280" font-family="sans-serif" font-size="16" font-weight="bold" fill="#10B981" text-anchor="middle">Audit Evidence</text>
</svg>
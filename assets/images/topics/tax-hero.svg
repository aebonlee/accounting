<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#FFF1F2" rx="12"/>

  <!-- Government Building -->
  <polygon points="200,100 280,60 360,100" fill="#E11D48"/>
  <rect x="210" y="100" width="140" height="120" fill="#E11D48" rx="2"/>
  <rect x="225" y="110" width="30" height="40" fill="#FFF1F2" rx="2"/>
  <rect x="265" y="110" width="30" height="40" fill="#FFF1F2" rx="2"/>
  <rect x="305" y="110" width="30" height="40" fill="#FFF1F2" rx="2"/>
  <rect x="260" y="165" width="40" height="55" fill="#FFF1F2" rx="2"/>
  <!-- Building pillars -->
  <rect x="220" y="100" width="12" height="120" fill="#BE123C" rx="2"/>
  <rect x="248" y="100" width="12" height="120" fill="#BE123C" rx="2"/>
  <rect x="300" y="100" width="12" height="120" fill="#BE123C" rx="2"/>
  <rect x="328" y="100" width="12" height="120" fill="#BE123C" rx="2"/>
  <!-- Building base -->
  <rect x="195" y="220" width="170" height="14" fill="#9F1239" rx="3"/>
  <!-- Triangle pediment detail -->
  <circle cx="280" cy="85" r="12" fill="#FFF1F2"/>
  <text x="280" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E11D48">TAX</text>

  <!-- Tax Document 1 -->
  <rect x="420" y="70" width="120" height="160" fill="white" stroke="#E11D48" stroke-width="2" rx="6"/>
  <rect x="435" y="85" width="90" height="8" fill="#FECDD3" rx="2"/>
  <rect x="435" y="100" width="70" height="6" fill="#FDA4AF" rx="2"/>
  <rect x="435" y="114" width="80" height="6" fill="#FDA4AF" rx="2"/>
  <rect x="435" y="128" width="60" height="6" fill="#FDA4AF" rx="2"/>
  <rect x="435" y="148" width="90" height="1" fill="#E11D48"/>
  <rect x="435" y="158" width="50" height="6" fill="#FECDD3" rx="2"/>
  <rect x="495" y="158" width="30" height="6" fill="#E11D48" rx="2"/>
  <rect x="435" y="172" width="50" height="6" fill="#FECDD3" rx="2"/>
  <rect x="495" y="172" width="30" height="6" fill="#E11D48" rx="2"/>
  <rect x="435" y="192" width="90" height="1" fill="#E11D48"/>
  <text x="480" y="215" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E11D48">TAX RETURN</text>

  <!-- Calculator -->
  <rect x="580" y="100" width="100" height="130" fill="#1F2937" rx="8"/>
  <rect x="590" y="110" width="80" height="30" fill="#86EFAC" rx="4"/>
  <text x="660" y="132" text-anchor="end" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1F2937">1,250,000</text>
  <!-- Calculator buttons -->
  <rect x="590" y="150" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="612" y="150" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="634" y="150" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="656" y="150" width="16" height="14" fill="#E11D48" rx="2"/>
  <rect x="590" y="170" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="612" y="170" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="634" y="170" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="656" y="170" width="16" height="14" fill="#E11D48" rx="2"/>
  <rect x="590" y="190" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="612" y="190" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="634" y="190" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="656" y="190" width="16" height="14" fill="#E11D48" rx="2"/>
  <rect x="590" y="210" width="38" height="14" fill="#6B7280" rx="2"/>
  <rect x="634" y="210" width="16" height="14" fill="#6B7280" rx="2"/>
  <rect x="656" y="210" width="16" height="14" fill="#FB7185" rx="2"/>

  <!-- Money / Coins -->
  <circle cx="160" cy="300" r="28" fill="#FBBF24"/>
  <circle cx="160" cy="300" r="20" fill="#F59E0B"/>
  <text x="160" y="306" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FBBF24">W</text>
  <circle cx="220" cy="320" r="22" fill="#FBBF24"/>
  <circle cx="220" cy="320" r="16" fill="#F59E0B"/>
  <text x="220" y="325" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FBBF24">W</text>

  <!-- Banknotes -->
  <rect x="440" y="260" width="120" height="55" fill="#34D399" rx="6" transform="rotate(-5 500 287)"/>
  <rect x="440" y="260" width="120" height="55" fill="#10B981" rx="6"/>
  <text x="500" y="293" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">10,000</text>

  <!-- Percent symbol -->
  <circle cx="680" cy="290" r="35" fill="#E11D48" opacity="0.15"/>
  <text x="680" y="302" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#E11D48">%</text>

  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#E11D48">Tax Accounting</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#ECFDF5" rx="12"/>

  <!-- Background decorations -->
  <circle cx="370" cy="40" r="18" fill="#D1FAE5"/>
  <rect x="15" y="250" width="30" height="30" fill="#D1FAE5" rx="4" transform="rotate(10 30 265)"/>

  <!-- Central Shield -->
  <path d="M200,30 L280,58 L280,145 C280,195 245,235 200,260 C155,235 120,195 120,145 L120,58 Z" fill="#10B981"/>
  <path d="M200,45 L270,70 L270,145 C270,190 240,225 200,247 C160,225 130,190 130,145 L130,70 Z" fill="#FFFFFF"/>

  <!-- Lock inside shield -->
  <rect x="180" y="120" width="40" height="32" fill="#10B981" rx="4"/>
  <path d="M186,120 L186,108 C186,98 192,90 200,90 C208,90 214,98 214,108 L214,120" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="200" cy="132" r="5" fill="#FFFFFF"/>
  <rect x="198" y="134" width="4" height="8" fill="#FFFFFF" rx="1"/>

  <!-- Lock label -->
  <text x="200" y="170" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981" text-anchor="middle">SECURE</text>

  <!-- Organizational Flow - Left side -->
  <rect x="20" y="60" width="70" height="30" fill="#34D399" rx="5"/>
  <text x="55" y="80" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Board</text>

  <line x1="55" y1="90" x2="55" y2="110" stroke="#34D399" stroke-width="2"/>

  <rect x="20" y="110" width="70" height="30" fill="#FFFFFF" rx="5" stroke="#34D399" stroke-width="1.5"/>
  <text x="55" y="130" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981" text-anchor="middle">Mgmt</text>

  <line x1="55" y1="140" x2="55" y2="160" stroke="#34D399" stroke-width="2"/>

  <rect x="20" y="160" width="70" height="30" fill="#FFFFFF" rx="5" stroke="#34D399" stroke-width="1.5"/>
  <text x="55" y="180" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981" text-anchor="middle">Dept</text>

  <line x1="55" y1="190" x2="55" y2="210" stroke="#34D399" stroke-width="2"/>

  <rect x="20" y="210" width="70" height="30" fill="#FFFFFF" rx="5" stroke="#34D399" stroke-width="1.5"/>
  <text x="55" y="230" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981" text-anchor="middle">Staff</text>

  <!-- Organizational Flow - Right side -->
  <rect x="310" y="60" width="70" height="30" fill="#34D399" rx="5"/>
  <text x="345" y="80" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Policy</text>

  <line x1="345" y1="90" x2="345" y2="110" stroke="#34D399" stroke-width="2"/>

  <rect x="310" y="110" width="70" height="30" fill="#FFFFFF" rx="5" stroke="#34D399" stroke-width="1.5"/>
  <text x="345" y="130" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981" text-anchor="middle">Process</text>

  <line x1="345" y1="140" x2="345" y2="160" stroke="#34D399" stroke-width="2"/>

  <rect x="310" y="160" width="70" height="30" fill="#FFFFFF" rx="5" stroke="#34D399" stroke-width="1.5"/>
  <text x="345" y="180" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981" text-anchor="middle">Monitor</text>

  <line x1="345" y1="190" x2="345" y2="210" stroke="#34D399" stroke-width="2"/>

  <rect x="310" y="210" width="70" height="30" fill="#FFFFFF" rx="5" stroke="#34D399" stroke-width="1.5"/>
  <text x="345" y="230" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981" text-anchor="middle">Report</text>

  <!-- Connecting lines to shield -->
  <line x1="90" y1="75" x2="120" y2="90" stroke="#A7F3D0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="90" y1="175" x2="120" y2="155" stroke="#A7F3D0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="310" y1="75" x2="280" y2="90" stroke="#A7F3D0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="310" y1="175" x2="280" y2="155" stroke="#A7F3D0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="200" y="278" font-family="sans-serif" font-size="16" font-weight="bold" fill="#10B981" text-anchor="middle">Internal Control</text>
</svg>
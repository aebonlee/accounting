<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#F0FDF4" rx="8"/>

  <!-- Title -->
  <text x="200" y="28" font-family="sans-serif" font-size="15" fill="#059669" text-anchor="middle" font-weight="bold">Changes in Equity</text>

  <!-- Y-axis -->
  <line x1="60" y1="45" x2="60" y2="240" stroke="#059669" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="60" y1="240" x2="370" y2="240" stroke="#059669" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="50" y="80" font-family="sans-serif" font-size="9" fill="#059669" text-anchor="end">500</text>
  <text x="50" y="120" font-family="sans-serif" font-size="9" fill="#059669" text-anchor="end">400</text>
  <text x="50" y="160" font-family="sans-serif" font-size="9" fill="#059669" text-anchor="end">300</text>
  <text x="50" y="200" font-family="sans-serif" font-size="9" fill="#059669" text-anchor="end">200</text>
  <text x="50" y="240" font-family="sans-serif" font-size="9" fill="#059669" text-anchor="end">100</text>

  <!-- Grid lines -->
  <line x1="60" y1="80" x2="370" y2="80" stroke="#059669" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="120" x2="370" y2="120" stroke="#059669" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="160" x2="370" y2="160" stroke="#059669" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="200" x2="370" y2="200" stroke="#059669" stroke-width="0.5" opacity="0.2"/>

  <!-- Period 1 stacked bar -->
  <rect x="85" y="160" width="50" height="80" fill="#059669" rx="2"/>
  <rect x="85" y="120" width="50" height="40" fill="#34D399" rx="0"/>
  <rect x="85" y="100" width="50" height="20" fill="#A7F3D0" rx="2"/>

  <!-- Period 2 stacked bar -->
  <rect x="160" y="140" width="50" height="100" fill="#059669" rx="2"/>
  <rect x="160" y="100" width="50" height="40" fill="#34D399" rx="0"/>
  <rect x="160" y="75" width="50" height="25" fill="#A7F3D0" rx="2"/>

  <!-- Period 3 stacked bar -->
  <rect x="235" y="120" width="50" height="120" fill="#059669" rx="2"/>
  <rect x="235" y="80" width="50" height="40" fill="#34D399" rx="0"/>
  <rect x="235" y="58" width="50" height="22" fill="#A7F3D0" rx="2"/>

  <!-- Period 4 stacked bar -->
  <rect x="310" y="100" width="50" height="140" fill="#059669" rx="2"/>
  <rect x="310" y="62" width="50" height="38" fill="#34D399" rx="0"/>
  <rect x="310" y="45" width="50" height="17" fill="#A7F3D0" rx="2"/>

  <!-- X-axis labels -->
  <text x="110" y="255" font-family="sans-serif" font-size="10" fill="#059669" text-anchor="middle">Q1</text>
  <text x="185" y="255" font-family="sans-serif" font-size="10" fill="#059669" text-anchor="middle">Q2</text>
  <text x="260" y="255" font-family="sans-serif" font-size="10" fill="#059669" text-anchor="middle">Q3</text>
  <text x="335" y="255" font-family="sans-serif" font-size="10" fill="#059669" text-anchor="middle">Q4</text>

  <!-- Growth arrow -->
  <path d="M105,95 L330,42" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="328,37 335,40 328,47" fill="#059669"/>

  <!-- Legend -->
  <rect x="80" y="272" width="12" height="12" fill="#059669" rx="2"/>
  <text x="97" y="283" font-family="sans-serif" font-size="10" fill="#059669">Capital Stock</text>
  <rect x="175" y="272" width="12" height="12" fill="#34D399" rx="2"/>
  <text x="192" y="283" font-family="sans-serif" font-size="10" fill="#059669">Surplus</text>
  <rect x="250" y="272" width="12" height="12" fill="#A7F3D0" rx="2"/>
  <text x="267" y="283" font-family="sans-serif" font-size="10" fill="#059669">Retained Earnings</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#F0FDF4" rx="8"/>

  <!-- Title -->
  <text x="200" y="28" font-family="sans-serif" font-size="15" fill="#059669" text-anchor="middle" font-weight="bold">Income Statement</text>

  <!-- Baseline -->
  <line x1="50" y1="250" x2="350" y2="250" stroke="#059669" stroke-width="2"/>

  <!-- Revenue bar -->
  <rect x="70" y="60" width="70" height="190" fill="#059669" rx="4"/>
  <text x="105" y="52" font-family="sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="bold">Revenue</text>
  <text x="105" y="100" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">1,000</text>

  <!-- Expense bar -->
  <rect x="165" y="120" width="70" height="130" fill="#6EE7B7" rx="4"/>
  <text x="200" y="112" font-family="sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="bold">Expenses</text>
  <text x="200" y="165" font-family="sans-serif" font-size="12" fill="#059669" text-anchor="middle" font-weight="bold">700</text>

  <!-- Net Income bar -->
  <rect x="260" y="180" width="70" height="70" fill="#059669" rx="4"/>
  <text x="295" y="172" font-family="sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="bold">Net Income</text>
  <text x="295" y="222" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">300</text>

  <!-- Minus sign between Revenue and Expense -->
  <circle cx="152" cy="195" r="12" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="145" y="193" width="14" height="3" fill="#059669" rx="1"/>

  <!-- Equals sign between Expense and Net Income -->
  <circle cx="247" cy="215" r="12" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="240" y="211" width="14" height="3" fill="#059669" rx="1"/>
  <rect x="240" y="217" width="14" height="3" fill="#059669" rx="1"/>

  <!-- Arrow from Revenue down to Net Income level -->
  <path d="M345,80 L345,210 L338,210" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="335,205 345,215 355,205" fill="#059669"/>

  <!-- Annotation -->
  <text x="200" y="275" font-family="sans-serif" font-size="11" fill="#059669" text-anchor="middle">Revenue - Expenses = Net Income</text>

  <!-- Growth arrow -->
  <polygon points="365,75 375,60 385,75" fill="#059669"/>
  <rect x="377" y="75" width="4" height="30" fill="#059669" rx="1"/>
</svg>
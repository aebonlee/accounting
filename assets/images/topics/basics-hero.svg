<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#F0F5FF" rx="12"/>

  <!-- Abstract geometric shapes - background -->
  <rect x="30" y="40" width="60" height="60" fill="#DBEAFE" rx="8" transform="rotate(15 60 70)"/>
  <rect x="700" y="50" width="50" height="50" fill="#DBEAFE" rx="6" transform="rotate(-10 725 75)"/>
  <circle cx="680" cy="320" r="30" fill="#DBEAFE"/>
  <rect x="60" y="300" width="40" height="40" fill="#DBEAFE" rx="4" transform="rotate(25 80 320)"/>

  <!-- Open Textbook -->
  <rect x="180" y="100" width="200" height="250" fill="#FFFFFF" rx="6" stroke="#1D4ED8" stroke-width="2"/>
  <rect x="180" y="100" width="200" height="250" fill="#FFFFFF" rx="6" stroke="#1D4ED8" stroke-width="2" transform="skewY(-3)"/>
  <rect x="370" y="100" width="200" height="250" fill="#F8FAFF" rx="6" stroke="#1D4ED8" stroke-width="2" transform="skewY(3)"/>
  <!-- Book spine -->
  <line x1="380" y1="95" x2="380" y2="355" stroke="#1D4ED8" stroke-width="3"/>

  <!-- Left page content - lines -->
  <line x1="210" y1="145" x2="350" y2="135" stroke="#BFDBFE" stroke-width="2"/>
  <line x1="210" y1="165" x2="340" y2="155" stroke="#BFDBFE" stroke-width="2"/>
  <line x1="210" y1="185" x2="345" y2="175" stroke="#BFDBFE" stroke-width="2"/>

  <!-- Dollar sign on left page -->
  <text x="270" y="260" font-family="sans-serif" font-size="48" font-weight="bold" fill="#1D4ED8" text-anchor="middle">$</text>

  <!-- Right page - T-Account -->
  <line x1="420" y1="140" x2="540" y2="146" stroke="#1D4ED8" stroke-width="2.5"/>
  <line x1="480" y1="140" x2="480" y2="220" stroke="#1D4ED8" stroke-width="2.5"/>
  <text x="445" y="170" font-family="sans-serif" font-size="12" fill="#3B82F6">Debit</text>
  <text x="495" y="170" font-family="sans-serif" font-size="12" fill="#3B82F6">Credit</text>

  <!-- Equals sign on right page -->
  <text x="480" y="285" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1D4ED8" text-anchor="middle">=</text>

  <!-- Calculator -->
  <rect x="610" y="120" width="120" height="170" fill="#FFFFFF" rx="10" stroke="#1D4ED8" stroke-width="2"/>
  <rect x="625" y="135" width="90" height="35" fill="#DBEAFE" rx="4"/>
  <text x="700" y="160" font-family="sans-serif" font-size="16" fill="#1D4ED8" text-anchor="middle">1,000</text>
  <!-- Calculator buttons -->
  <rect x="625" y="182" width="20" height="18" fill="#1D4ED8" rx="3"/>
  <rect x="652" y="182" width="20" height="18" fill="#1D4ED8" rx="3"/>
  <rect x="679" y="182" width="20" height="18" fill="#3B82F6" rx="3"/>
  <rect x="625" y="208" width="20" height="18" fill="#1D4ED8" rx="3"/>
  <rect x="652" y="208" width="20" height="18" fill="#1D4ED8" rx="3"/>
  <rect x="679" y="208" width="20" height="18" fill="#3B82F6" rx="3"/>
  <rect x="625" y="234" width="20" height="18" fill="#1D4ED8" rx="3"/>
  <rect x="652" y="234" width="20" height="18" fill="#1D4ED8" rx="3"/>
  <rect x="679" y="234" width="20" height="18" fill="#3B82F6" rx="3"/>
  <rect x="625" y="260" width="47" height="18" fill="#1D4ED8" rx="3"/>
  <rect x="679" y="260" width="20" height="18" fill="#60A5FA" rx="3"/>

  <!-- Balance beam at bottom -->
  <polygon points="400,340 390,360 410,360" fill="#1D4ED8"/>
  <rect x="300" y="330" width="200" height="8" fill="#1D4ED8" rx="4"/>
  <circle cx="320" cy="325" r="12" fill="#3B82F6"/>
  <circle cx="480" cy="325" r="12" fill="#3B82F6"/>

  <!-- Title -->
  <text x="400" y="390" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Accounting Basics</text>
</svg>
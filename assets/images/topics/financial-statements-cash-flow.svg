<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#F0FDF4" rx="8"/>

  <!-- Title -->
  <text x="200" y="28" font-family="sans-serif" font-size="15" fill="#059669" text-anchor="middle" font-weight="bold">Cash Flow Statement</text>

  <!-- Central coin/money circle -->
  <circle cx="200" cy="80" r="30" fill="#059669"/>
  <circle cx="200" cy="80" r="22" fill="#34D399"/>
  <text x="200" y="86" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">$</text>

  <!-- Three flowing channels -->

  <!-- Operating (left) -->
  <rect x="30" y="148" width="100" height="3" fill="#059669" rx="1"/>
  <rect x="30" y="155" width="100" height="3" fill="#059669" opacity="0.5" rx="1"/>
  <path d="M80,110 C80,130 80,130 80,148" fill="none" stroke="#059669" stroke-width="3"/>
  <polygon points="75,143 80,153 85,143" fill="#059669"/>

  <rect x="20" y="170" width="120" height="80" fill="#059669" rx="8"/>
  <text x="80" y="195" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Operating</text>
  <text x="80" y="212" font-family="sans-serif" font-size="10" fill="#A7F3D0" text-anchor="middle">Sales, Wages</text>
  <text x="80" y="228" font-family="sans-serif" font-size="10" fill="#A7F3D0" text-anchor="middle">Day-to-day</text>

  <!-- Small coins flowing down left channel -->
  <circle cx="65" cy="125" r="5" fill="#34D399"/>
  <circle cx="90" cy="135" r="4" fill="#34D399"/>

  <!-- Investing (center) -->
  <path d="M200,110 L200,148" fill="none" stroke="#059669" stroke-width="3"/>
  <polygon points="195,143 200,153 205,143" fill="#059669"/>
  <rect x="195" y="148" width="10" height="3" fill="#34D399" rx="1"/>

  <rect x="140" y="170" width="120" height="80" fill="#34D399" rx="8"/>
  <text x="200" y="195" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Investing</text>
  <text x="200" y="212" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">Equipment, Assets</text>
  <text x="200" y="228" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">Long-term</text>

  <!-- Small coins flowing down center channel -->
  <circle cx="195" cy="125" r="5" fill="#6EE7B7"/>
  <circle cx="210" cy="138" r="4" fill="#6EE7B7"/>

  <!-- Financing (right) -->
  <rect x="270" y="148" width="100" height="3" fill="#059669" rx="1"/>
  <rect x="270" y="155" width="100" height="3" fill="#059669" opacity="0.5" rx="1"/>
  <path d="M320,110 C320,130 320,130 320,148" fill="none" stroke="#059669" stroke-width="3"/>
  <polygon points="315,143 320,153 325,143" fill="#059669"/>

  <rect x="260" y="170" width="120" height="80" fill="#059669" rx="8"/>
  <text x="320" y="195" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Financing</text>
  <text x="320" y="212" font-family="sans-serif" font-size="10" fill="#A7F3D0" text-anchor="middle">Loans, Equity</text>
  <text x="320" y="228" font-family="sans-serif" font-size="10" fill="#A7F3D0" text-anchor="middle">Capital</text>

  <!-- Small coins flowing down right channel -->
  <circle cx="305" cy="128" r="5" fill="#34D399"/>
  <circle cx="330" cy="120" r="4" fill="#34D399"/>

  <!-- Bottom total bar -->
  <rect x="50" y="265" width="300" height="24" fill="#059669" rx="12"/>
  <text x="200" y="282" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Net Cash Flow = Operating + Investing + Financing</text>
</svg>
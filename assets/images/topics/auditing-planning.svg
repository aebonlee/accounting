<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#ECFDF5" rx="12"/>

  <!-- Background decorations -->
  <circle cx="360" cy="250" r="22" fill="#D1FAE5"/>
  <rect x="15" y="30" width="35" height="35" fill="#D1FAE5" rx="4" transform="rotate(-10 32 48)"/>

  <!-- Calendar -->
  <rect x="40" y="50" width="150" height="160" fill="#FFFFFF" rx="8" stroke="#10B981" stroke-width="2"/>
  <!-- Calendar header -->
  <rect x="40" y="50" width="150" height="35" fill="#10B981" rx="8"/>
  <rect x="40" y="70" width="150" height="20" fill="#10B981"/>
  <!-- Calendar rings -->
  <circle cx="80" cy="50" r="5" fill="#FFFFFF"/>
  <circle cx="150" cy="50" r="5" fill="#FFFFFF"/>
  <!-- Calendar month text -->
  <text x="115" y="75" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">AUDIT PLAN</text>

  <!-- Calendar grid lines -->
  <line x1="70" y1="90" x2="70" y2="210" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="100" y1="90" x2="100" y2="210" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="130" y1="90" x2="130" y2="210" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="160" y1="90" x2="160" y2="210" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="40" y1="120" x2="190" y2="120" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="40" y1="150" x2="190" y2="150" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="40" y1="180" x2="190" y2="180" stroke="#D1FAE5" stroke-width="1"/>

  <!-- Calendar date numbers -->
  <text x="55" y="110" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">1</text>
  <text x="85" y="110" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">2</text>
  <text x="115" y="110" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">3</text>
  <text x="145" y="110" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">4</text>
  <text x="175" y="110" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">5</text>

  <!-- Highlighted audit dates -->
  <circle cx="115" cy="137" r="10" fill="#6EE7B7"/>
  <text x="115" y="141" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">10</text>
  <circle cx="175" cy="167" r="10" fill="#10B981"/>
  <text x="175" y="171" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">19</text>
  <circle cx="85" cy="197" r="10" fill="#6EE7B7"/>
  <text x="85" y="201" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">22</text>

  <!-- Plan Document -->
  <rect x="220" y="40" width="150" height="190" fill="#FFFFFF" rx="6" stroke="#10B981" stroke-width="2"/>
  <!-- Document header -->
  <rect x="220" y="40" width="150" height="30" fill="#F0FDF4" rx="6"/>
  <rect x="220" y="60" width="150" height="10" fill="#F0FDF4"/>
  <text x="295" y="62" font-family="sans-serif" font-size="11" font-weight="bold" fill="#10B981" text-anchor="middle">Planning Doc</text>

  <!-- Checklist items -->
  <rect x="238" y="85" width="14" height="14" fill="none" stroke="#10B981" stroke-width="1.5" rx="2"/>
  <polyline points="241,92 244,96 250,88" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <text x="260" y="96" font-family="sans-serif" font-size="10" fill="#4B5563">Scope Definition</text>

  <rect x="238" y="110" width="14" height="14" fill="none" stroke="#10B981" stroke-width="1.5" rx="2"/>
  <polyline points="241,117 244,121 250,113" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <text x="260" y="121" font-family="sans-serif" font-size="10" fill="#4B5563">Risk Assessment</text>

  <rect x="238" y="135" width="14" height="14" fill="none" stroke="#10B981" stroke-width="1.5" rx="2"/>
  <text x="260" y="146" font-family="sans-serif" font-size="10" fill="#4B5563">Materiality Level</text>

  <rect x="238" y="160" width="14" height="14" fill="none" stroke="#10B981" stroke-width="1.5" rx="2"/>
  <text x="260" y="171" font-family="sans-serif" font-size="10" fill="#4B5563">Team Assignment</text>

  <rect x="238" y="185" width="14" height="14" fill="none" stroke="#10B981" stroke-width="1.5" rx="2"/>
  <text x="260" y="196" font-family="sans-serif" font-size="10" fill="#4B5563">Timeline Setup</text>

  <!-- Risk Indicators -->
  <!-- High risk -->
  <rect x="230" y="235" width="40" height="30" fill="#EF4444" rx="5"/>
  <text x="250" y="255" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle">HIGH</text>

  <!-- Medium risk -->
  <rect x="280" y="235" width="40" height="30" fill="#F59E0B" rx="5"/>
  <text x="300" y="255" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle">MED</text>

  <!-- Low risk -->
  <rect x="330" y="235" width="40" height="30" fill="#10B981" rx="5"/>
  <text x="350" y="255" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle">LOW</text>

  <!-- Arrow from calendar to document -->
  <line x1="195" y1="130" x2="215" y2="130" stroke="#6EE7B7" stroke-width="2"/>
  <polygon points="215,125 225,130 215,135" fill="#6EE7B7"/>

  <!-- Title -->
  <text x="200" y="286" font-family="sans-serif" font-size="16" font-weight="bold" fill="#10B981" text-anchor="middle">Audit Planning</text>
</svg>
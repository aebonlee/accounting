<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFF1F2" rx="10"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#E11D48">Withholding Tax &amp; Payroll</text>

  <!-- Paycheck Document -->
  <rect x="30" y="45" width="180" height="230" fill="white" stroke="#E11D48" stroke-width="2" rx="8"/>

  <!-- Paycheck header -->
  <rect x="30" y="45" width="180" height="35" fill="#E11D48" rx="8"/>
  <rect x="30" y="65" width="180" height="15" fill="#E11D48"/>
  <text x="120" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">PAY STATEMENT</text>

  <!-- Employee info -->
  <text x="45" y="100" font-family="sans-serif" font-size="9" fill="#6B7280">Employee: Kim Cheolsu</text>
  <text x="45" y="114" font-family="sans-serif" font-size="9" fill="#6B7280">Period: 2026.03</text>
  <line x1="40" y1="120" x2="200" y2="120" stroke="#FECDD3" stroke-width="1"/>

  <!-- Earnings section -->
  <text x="45" y="136" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1F2937">Gross Pay</text>
  <text x="195" y="136" text-anchor="end" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1F2937">4,000,000</text>

  <text x="50" y="152" font-family="sans-serif" font-size="9" fill="#6B7280">Base Salary</text>
  <text x="195" y="152" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">3,500,000</text>
  <text x="50" y="166" font-family="sans-serif" font-size="9" fill="#6B7280">Overtime</text>
  <text x="195" y="166" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">500,000</text>

  <line x1="40" y1="174" x2="200" y2="174" stroke="#E11D48" stroke-width="1"/>

  <!-- Deductions section -->
  <text x="45" y="190" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E11D48">Deductions</text>
  <text x="195" y="190" text-anchor="end" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E11D48">-580,000</text>

  <rect x="40" y="196" width="165" height="18" fill="#FECDD3" rx="3"/>
  <text x="50" y="209" font-family="sans-serif" font-size="9" fill="#9F1239">Income Tax</text>
  <text x="195" y="209" text-anchor="end" font-family="sans-serif" font-size="9" fill="#9F1239">-120,000</text>

  <rect x="40" y="216" width="165" height="18" fill="#FFE4E6" rx="3"/>
  <text x="50" y="229" font-family="sans-serif" font-size="9" fill="#9F1239">Local Income Tax</text>
  <text x="195" y="229" text-anchor="end" font-family="sans-serif" font-size="9" fill="#9F1239">-12,000</text>

  <text x="50" y="247" font-family="sans-serif" font-size="9" fill="#6B7280">National Pension</text>
  <text x="195" y="247" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">-180,000</text>
  <text x="50" y="261" font-family="sans-serif" font-size="9" fill="#6B7280">Health Insurance</text>
  <text x="195" y="261" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">-268,000</text>

  <!-- Net Pay -->
  <line x1="40" y1="267" x2="200" y2="267" stroke="#E11D48" stroke-width="2"/>

  <!-- Right side: Flow diagram -->
  <!-- Employer box -->
  <rect x="240" y="48" width="140" height="44" fill="#E11D48" rx="8"/>
  <text x="310" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Employer</text>
  <text x="310" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FECDD3">(Withholding Agent)</text>

  <!-- Arrow down to employee -->
  <line x1="280" y1="92" x2="280" y2="128" stroke="#E11D48" stroke-width="2"/>
  <polygon points="280,132 275,124 285,124" fill="#E11D48"/>
  <text x="266" y="115" text-anchor="end" font-family="sans-serif" font-size="9" fill="#4B5563">Net Pay</text>

  <!-- Arrow down to government -->
  <line x1="340" y1="92" x2="340" y2="128" stroke="#E11D48" stroke-width="2"/>
  <polygon points="340,132 335,124 345,124" fill="#E11D48"/>
  <text x="354" y="115" font-family="sans-serif" font-size="9" fill="#E11D48">Tax</text>

  <!-- Employee box -->
  <rect x="240" y="134" width="65" height="44" fill="#FECDD3" rx="8"/>
  <circle cx="272" cy="148" r="8" fill="#E11D48"/>
  <text x="272" y="172" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Employee</text>

  <!-- Government box -->
  <rect x="315" y="134" width="65" height="44" fill="#FECDD3" rx="8"/>
  <polygon points="347,140 358,148 336,148" fill="#E11D48"/>
  <rect x="338" y="148" width="18" height="14" fill="#E11D48" rx="1"/>
  <text x="347" y="172" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Gov</text>

  <!-- Withholding breakdown pie-like -->
  <text x="310" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E11D48">Deduction Breakdown</text>

  <!-- Bar chart -->
  <rect x="240" y="212" width="70" height="16" fill="#E11D48" rx="3"/>
  <text x="244" y="224" font-family="sans-serif" font-size="8" fill="white">Income Tax</text>

  <rect x="240" y="232" width="50" height="16" fill="#FB7185" rx="3"/>
  <text x="244" y="244" font-family="sans-serif" font-size="8" fill="white">Pension</text>

  <rect x="240" y="252" width="58" height="16" fill="#FDA4AF" rx="3"/>
  <text x="244" y="264" font-family="sans-serif" font-size="8" fill="#9F1239">Health Ins.</text>

  <rect x="240" y="272" width="15" height="16" fill="#FECDD3" rx="3"/>
  <text x="260" y="284" font-family="sans-serif" font-size="8" fill="#9F1239">Local Tax</text>

  <!-- Percentage labels -->
  <text x="316" y="224" font-family="sans-serif" font-size="9" fill="#E11D48">20.7%</text>
  <text x="296" y="244" font-family="sans-serif" font-size="9" fill="#FB7185">31.0%</text>
  <text x="304" y="264" font-family="sans-serif" font-size="9" fill="#FDA4AF">46.2%</text>
  <text x="260" y="284" font-family="sans-serif" font-size="9" fill="#FECDD3">2.1%</text>
</svg>
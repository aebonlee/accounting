<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#ECFDF5" rx="12"/>

  <!-- Background decorations -->
  <circle cx="350" cy="40" r="20" fill="#D1FAE5"/>
  <rect x="20" y="240" width="30" height="30" fill="#D1FAE5" rx="4" transform="rotate(15 35 255)"/>

  <!-- Central magnifying glass -->
  <circle cx="160" cy="130" r="50" fill="none" stroke="#10B981" stroke-width="4"/>
  <circle cx="160" cy="130" r="42" fill="#F0FDF4"/>
  <line x1="197" y1="167" x2="235" y2="205" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>

  <!-- Document inside magnifying glass -->
  <rect x="140" y="105" width="40" height="50" fill="#FFFFFF" rx="3" stroke="#10B981" stroke-width="1.5"/>
  <line x1="148" y1="118" x2="172" y2="118" stroke="#A7F3D0" stroke-width="1.5"/>
  <line x1="148" y1="126" x2="170" y2="126" stroke="#A7F3D0" stroke-width="1.5"/>
  <line x1="148" y1="134" x2="168" y2="134" stroke="#A7F3D0" stroke-width="1.5"/>
  <line x1="148" y1="142" x2="172" y2="142" stroke="#A7F3D0" stroke-width="1.5"/>

  <!-- Branch lines from magnifying glass to types -->
  <line x1="210" y1="110" x2="270" y2="60" stroke="#34D399" stroke-width="2"/>
  <line x1="210" y1="130" x2="270" y2="130" stroke="#34D399" stroke-width="2"/>
  <line x1="210" y1="150" x2="270" y2="200" stroke="#34D399" stroke-width="2"/>

  <!-- Type 1: External Audit -->
  <rect x="270" y="38" width="110" height="44" fill="#10B981" rx="8"/>
  <text x="325" y="56" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">External</text>
  <text x="325" y="72" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Audit</text>

  <!-- Type 2: Internal Audit -->
  <rect x="270" y="108" width="110" height="44" fill="#34D399" rx="8"/>
  <text x="325" y="126" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Internal</text>
  <text x="325" y="142" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Audit</text>

  <!-- Type 3: Compliance Audit -->
  <rect x="270" y="178" width="110" height="44" fill="#10B981" rx="8"/>
  <text x="325" y="196" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Compliance</text>
  <text x="325" y="212" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Audit</text>

  <!-- Small icons next to types -->
  <circle cx="258" cy="60" r="6" fill="#34D399"/>
  <circle cx="258" cy="130" r="6" fill="#10B981"/>
  <circle cx="258" cy="200" r="6" fill="#34D399"/>

  <!-- Title -->
  <text x="200" y="272" font-family="sans-serif" font-size="16" font-weight="bold" fill="#10B981" text-anchor="middle">Audit Overview</text>
</svg>
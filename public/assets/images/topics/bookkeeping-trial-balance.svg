<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F5F3FF"/>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#8B5CF6">Trial Balance</text>

  <!-- Table container -->
  <rect x="40" y="42" width="320" height="236" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>

  <!-- Table header -->
  <rect x="40" y="42" width="320" height="28" rx="6" fill="#8B5CF6"/>
  <rect x="40" y="56" width="320" height="14" fill="#8B5CF6"/>
  <text x="135" y="62" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Account</text>
  <text x="275" y="62" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Debit</text>
  <text x="335" y="62" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Credit</text>

  <!-- Column dividers -->
  <line x1="240" y1="42" x2="240" y2="278" stroke="#DDD6FE" stroke-width="1"/>
  <line x1="308" y1="42" x2="308" y2="278" stroke="#DDD6FE" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="41" y="71" width="318" height="25" fill="#EDE9FE"/>
  <text x="55" y="88" font-family="sans-serif" font-size="10" fill="#4C1D95">Cash</text>
  <text x="275" y="88" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">43,000</text>

  <!-- Row 2 -->
  <rect x="41" y="96" width="318" height="25" fill="#FFFFFF"/>
  <text x="55" y="113" font-family="sans-serif" font-size="10" fill="#4C1D95">Accounts Receivable</text>
  <text x="275" y="113" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">15,000</text>

  <!-- Row 3 -->
  <rect x="41" y="121" width="318" height="25" fill="#EDE9FE"/>
  <text x="55" y="138" font-family="sans-serif" font-size="10" fill="#4C1D95">Equipment</text>
  <text x="275" y="138" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">12,000</text>

  <!-- Row 4 -->
  <rect x="41" y="146" width="318" height="25" fill="#FFFFFF"/>
  <text x="55" y="163" font-family="sans-serif" font-size="10" fill="#4C1D95">Accounts Payable</text>
  <text x="335" y="163" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">8,000</text>

  <!-- Row 5 -->
  <rect x="41" y="171" width="318" height="25" fill="#EDE9FE"/>
  <text x="55" y="188" font-family="sans-serif" font-size="10" fill="#4C1D95">Owner's Equity</text>
  <text x="335" y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">50,000</text>

  <!-- Row 6 -->
  <rect x="41" y="196" width="318" height="25" fill="#FFFFFF"/>
  <text x="55" y="213" font-family="sans-serif" font-size="10" fill="#4C1D95">Revenue</text>
  <text x="335" y="213" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">20,000</text>

  <!-- Row 7 -->
  <rect x="41" y="221" width="318" height="25" fill="#EDE9FE"/>
  <text x="55" y="238" font-family="sans-serif" font-size="10" fill="#4C1D95">Rent Expense</text>
  <text x="275" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">3,000</text>

  <!-- Row 8 -->
  <rect x="41" y="246" width="318" height="25" fill="#FFFFFF"/>
  <text x="55" y="263" font-family="sans-serif" font-size="10" fill="#4C1D95">Utilities Expense</text>
  <text x="275" y="263" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">5,000</text>

  <!-- Total line (double underline) -->
  <line x1="242" y1="270" x2="305" y2="270" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="310" y1="270" x2="357" y2="270" stroke="#8B5CF6" stroke-width="1.5"/>

  <!-- Totals row -->
  <rect x="41" y="271" width="318" height="6" fill="#DDD6FE"/>
  <!-- No fill needed, just the text below -->

  <!-- Total text area -->
  <text x="55" y="290" font-family="sans-serif" font-size="11" font-weight="bold" fill="#8B5CF6">Total</text>
  <text x="275" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#8B5CF6">78,000</text>
  <text x="335" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#8B5CF6">78,000</text>

  <!-- Double underline on totals -->
  <line x1="248" y1="293" x2="302" y2="293" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="248" y1="296" x2="302" y2="296" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="313" y1="293" x2="357" y2="293" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="313" y1="296" x2="357" y2="296" stroke="#8B5CF6" stroke-width="1.5"/>
</svg>
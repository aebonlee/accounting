<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#ECFDF5" rx="12"/>

  <!-- Background decorations -->
  <circle cx="45" cy="250" r="18" fill="#D1FAE5"/>
  <rect x="340" y="25" width="30" height="30" fill="#D1FAE5" rx="4" transform="rotate(12 355 40)"/>
  <circle cx="30" cy="40" r="14" fill="#D1FAE5"/>

  <!-- Balance Scale -->
  <!-- Scale base -->
  <rect x="185" y="200" width="30" height="8" fill="#10B981" rx="2"/>
  <polygon points="200,200 195,140 205,140" fill="#10B981"/>

  <!-- Scale beam -->
  <rect x="120" y="136" width="160" height="6" fill="#10B981" rx="3"/>

  <!-- Left scale pan -->
  <line x1="140" y1="142" x2="130" y2="170" stroke="#10B981" stroke-width="2"/>
  <line x1="140" y1="142" x2="150" y2="170" stroke="#10B981" stroke-width="2"/>
  <path d="M125,170 C125,180 155,180 155,170" fill="#A7F3D0" stroke="#10B981" stroke-width="1.5"/>
  <!-- Text in left pan -->
  <text x="140" y="166" font-family="sans-serif" font-size="7" font-weight="bold" fill="#10B981" text-anchor="middle">RIGHT</text>

  <!-- Right scale pan -->
  <line x1="260" y1="142" x2="250" y2="170" stroke="#10B981" stroke-width="2"/>
  <line x1="260" y1="142" x2="270" y2="170" stroke="#10B981" stroke-width="2"/>
  <path d="M245,170 C245,180 275,180 275,170" fill="#A7F3D0" stroke="#10B981" stroke-width="1.5"/>
  <!-- Text in right pan -->
  <text x="260" y="166" font-family="sans-serif" font-size="7" font-weight="bold" fill="#10B981" text-anchor="middle">WRONG</text>

  <!-- Handshake - left hand -->
  <path d="M60,100 L90,100 C95,100 100,95 100,90 L105,85 C110,80 120,80 120,90 L120,105 C120,110 115,115 110,115 L60,115 Z" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <!-- Handshake - right hand -->
  <path d="M60,100 L30,100 C25,100 20,95 20,90 L15,85 C10,80 0,80 0,90 L0,105 C0,110 5,115 10,115 L60,115 Z" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <!-- Handshake clasp -->
  <ellipse cx="60" cy="107" rx="18" ry="10" fill="#A7F3D0" stroke="#10B981" stroke-width="1.5"/>
  <text x="60" y="111" font-family="sans-serif" font-size="7" font-weight="bold" fill="#10B981" text-anchor="middle">TRUST</text>

  <!-- Integrity symbol - Star/badge on right -->
  <polygon points="340,100 348,118 368,118 352,130 358,148 340,138 322,148 328,130 312,118 332,118" fill="#10B981"/>
  <circle cx="340" cy="125" r="12" fill="#FFFFFF"/>
  <text x="340" y="129" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981" text-anchor="middle">I</text>

  <!-- Ethics principles labels around the scene -->
  <!-- Independence -->
  <rect x="20" y="30" width="90" height="28" fill="#FFFFFF" rx="6" stroke="#10B981" stroke-width="1.5"/>
  <text x="65" y="49" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981" text-anchor="middle">Independence</text>

  <!-- Objectivity -->
  <rect x="290" y="70" width="90" height="28" fill="#FFFFFF" rx="6" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="335" y="89" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981" text-anchor="middle">Objectivity</text>

  <!-- Confidentiality -->
  <rect x="20" y="155" width="90" height="28" fill="#FFFFFF" rx="6" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="65" y="174" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981" text-anchor="middle">Confidentiality</text>

  <!-- Due Care -->
  <rect x="290" y="170" width="90" height="28" fill="#FFFFFF" rx="6" stroke="#10B981" stroke-width="1.5"/>
  <text x="335" y="189" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981" text-anchor="middle">Due Care</text>

  <!-- Professional Behavior -->
  <rect x="130" y="220" width="140" height="28" fill="#10B981" rx="6"/>
  <text x="200" y="239" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Professional Behavior</text>

  <!-- Connecting dots between principles -->
  <circle cx="115" cy="44" r="3" fill="#A7F3D0"/>
  <circle cx="288" cy="84" r="3" fill="#A7F3D0"/>
  <circle cx="115" cy="169" r="3" fill="#A7F3D0"/>
  <circle cx="288" cy="184" r="3" fill="#A7F3D0"/>

  <!-- Dashed lines connecting to center -->
  <line x1="115" y1="44" x2="180" y2="100" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="288" y1="84" x2="270" y2="130" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="115" y1="169" x2="140" y2="155" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="288" y1="184" x2="265" y2="160" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Title -->
  <text x="200" y="278" font-family="sans-serif" font-size="16" font-weight="bold" fill="#10B981" text-anchor="middle">Audit Ethics</text>
</svg>
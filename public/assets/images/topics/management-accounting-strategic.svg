<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#F0FDFA" rx="10"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0891B2">Strategic Management Accounting</text>

  <!-- Chess Board (left side) -->
  <rect x="20" y="40" width="168" height="168" fill="#FFFFFF" rx="4" stroke="#0891B2" stroke-width="2"/>
  <!-- Chess grid - 6x6 simplified -->
  <!-- Row 1 -->
  <rect x="20" y="40" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="76" y="40" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="132" y="40" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="48" y="40" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="104" y="40" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="160" y="40" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <!-- Row 2 -->
  <rect x="48" y="68" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="104" y="68" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="160" y="68" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="20" y="68" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="76" y="68" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="132" y="68" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <!-- Row 3 -->
  <rect x="20" y="96" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="76" y="96" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="132" y="96" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="48" y="96" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="104" y="96" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="160" y="96" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <!-- Row 4 -->
  <rect x="48" y="124" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="104" y="124" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="160" y="124" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="20" y="124" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="76" y="124" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="132" y="124" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <!-- Row 5 -->
  <rect x="20" y="152" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="76" y="152" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="132" y="152" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="48" y="152" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="104" y="152" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="160" y="152" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <!-- Row 6 -->
  <rect x="48" y="180" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="104" y="180" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="160" y="180" width="28" height="28" fill="#0891B2" opacity="0.15"/>
  <rect x="20" y="180" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="76" y="180" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>
  <rect x="132" y="180" width="28" height="28" fill="#A5F3FC" opacity="0.3"/>

  <!-- Chess piece - King (simplified) at position -->
  <rect x="80" y="133" width="16" height="12" fill="#0891B2" rx="2"/>
  <rect x="85" y="126" width="6" height="7" fill="#0891B2"/>
  <rect x="82" y="123" width="12" height="4" fill="#0891B2" rx="1"/>
  <rect x="86" y="119" width="4" height="5" fill="#0891B2"/>

  <!-- Chess piece - another piece -->
  <rect x="136" y="99" width="16" height="12" fill="#A5F3FC" rx="2" stroke="#0891B2" stroke-width="1"/>
  <rect x="141" y="92" width="6" height="7" fill="#A5F3FC" stroke="#0891B2" stroke-width="1"/>
  <circle cx="144" cy="89" r="5" fill="#A5F3FC" stroke="#0891B2" stroke-width="1"/>

  <!-- Strategic arrows on the chess board -->
  <!-- Arrow 1: diagonal up-right -->
  <line x1="96" y1="132" x2="136" y2="108" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="136,108 128,108 133,100" fill="#0891B2"/>

  <!-- Arrow 2: knight move -->
  <line x1="96" y1="138" x2="136" y2="162" stroke="#0891B2" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="136,162 129,157 130,164" fill="#0891B2"/>

  <!-- Growth Chart (right side) -->
  <rect x="210" y="40" width="175" height="168" fill="#FFFFFF" rx="8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="297" y="62" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">Strategic Growth</text>

  <!-- Chart axes -->
  <line x1="235" y1="75" x2="235" y2="190" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="235" y1="190" x2="375" y2="190" stroke="#9CA3AF" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="230" y="85" text-anchor="end" font-family="sans-serif" font-size="8" fill="#9CA3AF">High</text>
  <text x="230" y="140" text-anchor="end" font-family="sans-serif" font-size="8" fill="#9CA3AF">Mid</text>
  <text x="230" y="192" text-anchor="end" font-family="sans-serif" font-size="8" fill="#9CA3AF">Low</text>

  <!-- Grid lines -->
  <line x1="235" y1="82" x2="370" y2="82" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="235" y1="136" x2="370" y2="136" stroke="#F3F4F6" stroke-width="1"/>

  <!-- Growth line (upward trend) -->
  <polyline points="245,180 265,170 285,155 305,135 325,110 345,90 365,78"
    fill="none" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="245" cy="180" r="4" fill="#A5F3FC" stroke="#0891B2" stroke-width="1.5"/>
  <circle cx="265" cy="170" r="4" fill="#A5F3FC" stroke="#0891B2" stroke-width="1.5"/>
  <circle cx="285" cy="155" r="4" fill="#A5F3FC" stroke="#0891B2" stroke-width="1.5"/>
  <circle cx="305" cy="135" r="4" fill="#A5F3FC" stroke="#0891B2" stroke-width="1.5"/>
  <circle cx="325" cy="110" r="4" fill="#A5F3FC" stroke="#0891B2" stroke-width="1.5"/>
  <circle cx="345" cy="90" r="4" fill="#A5F3FC" stroke="#0891B2" stroke-width="1.5"/>
  <circle cx="365" cy="78" r="4" fill="#0891B2"/>

  <!-- Trend arrow at the end -->
  <line x1="365" y1="78" x2="375" y2="68" stroke="#0891B2" stroke-width="2"/>
  <polygon points="375,68 369,72 373,76" fill="#0891B2"/>

  <!-- Strategic Tools Section (bottom) -->
  <rect x="20" y="220" width="360" height="65" fill="#FFFFFF" rx="8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="200" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">Strategic Tools</text>

  <!-- Tool badges -->
  <rect x="32" y="250" width="75" height="24" fill="#0891B2" rx="12"/>
  <text x="69" y="266" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">SWOT</text>

  <rect x="115" y="250" width="75" height="24" fill="#A5F3FC" rx="12"/>
  <text x="152" y="266" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#0E7490">Value Chain</text>

  <rect x="198" y="250" width="75" height="24" fill="#0891B2" rx="12"/>
  <text x="235" y="266" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">Benchmarking</text>

  <rect x="281" y="250" width="88" height="24" fill="#A5F3FC" rx="12"/>
  <text x="325" y="266" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#0E7490">Life Cycle Cost</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#F0F5FF" rx="10"/>

  <!-- Title -->
  <text x="200" y="30" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Accounting Cycle</text>

  <!-- Center circle decoration -->
  <circle cx="200" cy="160" r="45" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="200" y="156" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Accounting</text>
  <text x="200" y="170" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Cycle</text>

  <!-- Step 1: Journal (top) -->
  <rect x="155" y="45" width="90" height="42" fill="#1D4ED8" rx="8"/>
  <text x="200" y="63" font-family="sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Journal</text>
  <text x="200" y="78" font-family="sans-serif" font-size="9" fill="#DBEAFE" text-anchor="middle">Entries</text>

  <!-- Step 2: Ledger (right) -->
  <rect x="295" y="100" width="90" height="42" fill="#3B82F6" rx="8"/>
  <text x="340" y="118" font-family="sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Ledger</text>
  <text x="340" y="133" font-family="sans-serif" font-size="9" fill="#DBEAFE" text-anchor="middle">Posting</text>

  <!-- Step 3: Trial Balance (bottom-right) -->
  <rect x="295" y="180" width="90" height="42" fill="#1D4ED8" rx="8"/>
  <text x="340" y="198" font-family="sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Trial Balance</text>
  <text x="340" y="213" font-family="sans-serif" font-size="9" fill="#DBEAFE" text-anchor="middle">Verification</text>

  <!-- Step 4: Statements (bottom) -->
  <rect x="155" y="245" width="90" height="42" fill="#3B82F6" rx="8"/>
  <text x="200" y="263" font-family="sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Financial</text>
  <text x="200" y="278" font-family="sans-serif" font-size="9" fill="#DBEAFE" text-anchor="middle">Statements</text>

  <!-- Step 5: Closing (bottom-left) -->
  <rect x="15" y="180" width="90" height="42" fill="#1D4ED8" rx="8"/>
  <text x="60" y="198" font-family="sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Closing</text>
  <text x="60" y="213" font-family="sans-serif" font-size="9" fill="#DBEAFE" text-anchor="middle">Entries</text>

  <!-- Step 6: Adjustments (left) -->
  <rect x="15" y="100" width="90" height="42" fill="#3B82F6" rx="8"/>
  <text x="60" y="118" font-family="sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Adjustments</text>
  <text x="60" y="133" font-family="sans-serif" font-size="9" fill="#DBEAFE" text-anchor="middle">Corrections</text>

  <!-- Circular arrows: Top to Right -->
  <path d="M245 66 Q280 68 295 105" fill="none" stroke="#1D4ED8" stroke-width="2.5"/>
  <polygon points="295,105 290,95 300,97" fill="#1D4ED8"/>

  <!-- Right top to Right bottom -->
  <path d="M340 142 L340 180" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
  <polygon points="340,180 335,170 345,170" fill="#3B82F6"/>

  <!-- Right bottom to Bottom -->
  <path d="M295 210 Q270 240 245 255" fill="none" stroke="#1D4ED8" stroke-width="2.5"/>
  <polygon points="245,255 255,250 252,260" fill="#1D4ED8"/>

  <!-- Bottom to Left bottom -->
  <path d="M155 266 Q120 260 105 222" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
  <polygon points="105,222 100,232 110,230" fill="#3B82F6"/>

  <!-- Left bottom to Left top -->
  <path d="M60 180 L60 142" fill="none" stroke="#1D4ED8" stroke-width="2.5"/>
  <polygon points="60,142 55,152 65,152" fill="#1D4ED8"/>

  <!-- Left top to Top -->
  <path d="M105 110 Q130 80 155 70" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
  <polygon points="155,70 147,76 148,66" fill="#3B82F6"/>

  <!-- Step numbers -->
  <circle cx="163" cy="50" r="8" fill="#FFFFFF"/>
  <text x="163" y="54" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1D4ED8" text-anchor="middle">1</text>

  <circle cx="303" cy="105" r="8" fill="#FFFFFF"/>
  <text x="303" y="109" font-family="sans-serif" font-size="9" font-weight="bold" fill="#3B82F6" text-anchor="middle">2</text>

  <circle cx="303" cy="185" r="8" fill="#FFFFFF"/>
  <text x="303" y="189" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1D4ED8" text-anchor="middle">3</text>

  <circle cx="237" cy="250" r="8" fill="#FFFFFF"/>
  <text x="237" y="254" font-family="sans-serif" font-size="9" font-weight="bold" fill="#3B82F6" text-anchor="middle">4</text>

  <circle cx="97" cy="185" r="8" fill="#FFFFFF"/>
  <text x="97" y="189" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1D4ED8" text-anchor="middle">5</text>

  <circle cx="23" cy="105" r="8" fill="#FFFFFF"/>
  <text x="23" y="109" font-family="sans-serif" font-size="9" font-weight="bold" fill="#3B82F6" text-anchor="middle">6</text>
</svg>
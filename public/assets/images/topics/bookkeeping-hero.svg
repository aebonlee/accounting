<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="#F5F3FF"/>

  <!-- Ledger Book (open) -->
  <rect x="160" y="80" width="480" height="260" rx="8" fill="#EDE9FE"/>
  <!-- Spine -->
  <rect x="396" y="80" width="8" height="260" fill="#8B5CF6"/>
  <!-- Left page -->
  <rect x="170" y="90" width="220" height="240" rx="4" fill="#FFFFFF"/>
  <!-- Right page -->
  <rect x="410" y="90" width="220" height="240" rx="4" fill="#FFFFFF"/>

  <!-- Left page: T-Account 1 -->
  <text x="280" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#8B5CF6">Cash</text>
  <line x1="210" y1="128" x2="350" y2="128" stroke="#8B5CF6" stroke-width="2"/>
  <line x1="280" y1="128" x2="280" y2="195" stroke="#8B5CF6" stroke-width="2"/>
  <text x="240" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4C1D95">10,000</text>
  <text x="240" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4C1D95">5,000</text>
  <text x="320" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4C1D95">3,000</text>

  <!-- Left page: T-Account 2 -->
  <text x="280" y="220" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#8B5CF6">Revenue</text>
  <line x1="210" y1="228" x2="350" y2="228" stroke="#8B5CF6" stroke-width="2"/>
  <line x1="280" y1="228" x2="280" y2="295" stroke="#8B5CF6" stroke-width="2"/>
  <text x="320" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4C1D95">8,000</text>
  <text x="320" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4C1D95">4,500</text>

  <!-- Right page: T-Account 3 -->
  <text x="520" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#8B5CF6">Accounts Payable</text>
  <line x1="450" y1="128" x2="590" y2="128" stroke="#8B5CF6" stroke-width="2"/>
  <line x1="520" y1="128" x2="520" y2="195" stroke="#8B5CF6" stroke-width="2"/>
  <text x="480" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4C1D95">2,000</text>
  <text x="556" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4C1D95">6,000</text>

  <!-- Right page: T-Account 4 -->
  <text x="520" y="220" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#8B5CF6">Expenses</text>
  <line x1="450" y1="228" x2="590" y2="228" stroke="#8B5CF6" stroke-width="2"/>
  <line x1="520" y1="228" x2="520" y2="295" stroke="#8B5CF6" stroke-width="2"/>
  <text x="480" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4C1D95">3,200</text>
  <text x="480" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4C1D95">1,800</text>

  <!-- Pen -->
  <rect x="660" y="100" width="8" height="160" rx="3" fill="#8B5CF6" transform="rotate(25, 664, 180)"/>
  <polygon points="660,260 664,280 668,260" fill="#4C1D95" transform="rotate(25, 664, 180)"/>
  <rect x="660" y="95" width="8" height="12" rx="2" fill="#A78BFA" transform="rotate(25, 664, 180)"/>

  <!-- Calculator -->
  <rect x="60" y="160" width="80" height="120" rx="6" fill="#8B5CF6"/>
  <rect x="68" y="168" width="64" height="24" rx="3" fill="#DDD6FE"/>
  <text x="125" y="185" text-anchor="end" font-family="sans-serif" font-size="12" fill="#4C1D95">12,500</text>
  <!-- Calculator buttons row 1 -->
  <rect x="68" y="200" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="85" y="200" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="102" y="200" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="119" y="200" width="13" height="13" rx="2" fill="#EDE9FE"/>
  <!-- Calculator buttons row 2 -->
  <rect x="68" y="218" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="85" y="218" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="102" y="218" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="119" y="218" width="13" height="13" rx="2" fill="#EDE9FE"/>
  <!-- Calculator buttons row 3 -->
  <rect x="68" y="236" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="85" y="236" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="102" y="236" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="119" y="236" width="13" height="13" rx="2" fill="#EDE9FE"/>
  <!-- Calculator buttons row 4 -->
  <rect x="68" y="254" width="30" height="13" rx="2" fill="#A78BFA"/>
  <rect x="102" y="254" width="13" height="13" rx="2" fill="#A78BFA"/>
  <rect x="119" y="254" width="13" height="13" rx="2" fill="#C4B5FD"/>

  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#8B5CF6">Bookkeeping</text>
</svg>
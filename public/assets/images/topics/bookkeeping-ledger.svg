<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F5F3FF"/>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#8B5CF6">General Ledger</text>

  <!-- Book shape -->
  <rect x="25" y="40" width="350" height="240" rx="6" fill="#EDE9FE" stroke="#A78BFA" stroke-width="2"/>
  <!-- Book spine -->
  <rect x="25" y="40" width="14" height="240" rx="4" fill="#8B5CF6"/>

  <!-- T-Account 1: Cash -->
  <rect x="55" y="52" width="145" height="95" rx="4" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="127" y="68" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#8B5CF6">Cash</text>
  <line x1="60" y1="74" x2="195" y2="74" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="127" y1="74" x2="127" y2="142" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="70" y="88" font-family="sans-serif" font-size="9" fill="#4C1D95">Dr</text>
  <text x="185" y="88" text-anchor="end" font-family="sans-serif" font-size="9" fill="#4C1D95">Cr</text>
  <text x="90" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">50,000</text>
  <text x="160" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">12,000</text>
  <text x="90" y="120" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">8,000</text>
  <text x="160" y="120" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">3,000</text>
  <line x1="65" y1="128" x2="122" y2="128" stroke="#A78BFA" stroke-width="0.8"/>
  <text x="90" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#8B5CF6">43,000</text>

  <!-- T-Account 2: Equipment -->
  <rect x="215" y="52" width="145" height="95" rx="4" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="287" y="68" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#8B5CF6">Equipment</text>
  <line x1="220" y1="74" x2="355" y2="74" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="287" y1="74" x2="287" y2="142" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="230" y="88" font-family="sans-serif" font-size="9" fill="#4C1D95">Dr</text>
  <text x="345" y="88" text-anchor="end" font-family="sans-serif" font-size="9" fill="#4C1D95">Cr</text>
  <text x="253" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">12,000</text>
  <line x1="225" y1="112" x2="282" y2="112" stroke="#A78BFA" stroke-width="0.8"/>
  <text x="253" y="126" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#8B5CF6">12,000</text>

  <!-- T-Account 3: Revenue -->
  <rect x="55" y="158" width="145" height="95" rx="4" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="127" y="174" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#8B5CF6">Revenue</text>
  <line x1="60" y1="180" x2="195" y2="180" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="127" y1="180" x2="127" y2="248" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="70" y="194" font-family="sans-serif" font-size="9" fill="#4C1D95">Dr</text>
  <text x="185" y="194" text-anchor="end" font-family="sans-serif" font-size="9" fill="#4C1D95">Cr</text>
  <text x="160" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">8,000</text>
  <line x1="132" y1="218" x2="190" y2="218" stroke="#A78BFA" stroke-width="0.8"/>
  <text x="160" y="232" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#8B5CF6">8,000</text>

  <!-- T-Account 4: Owner's Equity -->
  <rect x="215" y="158" width="145" height="95" rx="4" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="287" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#8B5CF6">Owner's Equity</text>
  <line x1="220" y1="180" x2="355" y2="180" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="287" y1="180" x2="287" y2="248" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="230" y="194" font-family="sans-serif" font-size="9" fill="#4C1D95">Dr</text>
  <text x="345" y="194" text-anchor="end" font-family="sans-serif" font-size="9" fill="#4C1D95">Cr</text>
  <text x="320" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4C1D95">50,000</text>
  <line x1="292" y1="218" x2="350" y2="218" stroke="#A78BFA" stroke-width="0.8"/>
  <text x="320" y="232" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#8B5CF6">50,000</text>

  <!-- Page tabs on right -->
  <rect x="363" y="60" width="18" height="20" rx="3" fill="#8B5CF6"/>
  <text x="372" y="74" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FFFFFF">A</text>
  <rect x="363" y="85" width="18" height="20" rx="3" fill="#A78BFA"/>
  <text x="372" y="99" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FFFFFF">E</text>
  <rect x="363" y="110" width="18" height="20" rx="3" fill="#C4B5FD"/>
  <text x="372" y="124" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FFFFFF">L</text>

  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#A78BFA">Ledger Accounts - T-Account Format</text>
</svg>
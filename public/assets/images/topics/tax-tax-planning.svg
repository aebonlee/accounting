<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFF1F2" rx="10"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#E11D48">Tax Planning &amp; Strategy</text>

  <!-- Chess King piece (strategy symbol) -->
  <rect x="30" y="48" width="90" height="110" fill="white" stroke="#E11D48" stroke-width="2" rx="8"/>
  <!-- King cross -->
  <rect x="70" y="58" width="4" height="16" fill="#E11D48"/>
  <rect x="64" y="64" width="16" height="4" fill="#E11D48"/>
  <!-- King body -->
  <circle cx="72" cy="82" r="10" fill="#E11D48"/>
  <rect x="58" y="92" width="28" height="8" fill="#E11D48" rx="2"/>
  <polygon points="52,100 92,100 86,120 58,120" fill="#E11D48"/>
  <rect x="50" y="120" width="44" height="8" fill="#9F1239" rx="2"/>
  <text x="75" y="145" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E11D48">Strategy</text>

  <!-- Central target/goal -->
  <circle cx="200" cy="105" r="45" fill="#FFE4E6"/>
  <circle cx="200" cy="105" r="32" fill="#FECDD3"/>
  <circle cx="200" cy="105" r="19" fill="#FDA4AF"/>
  <circle cx="200" cy="105" r="8" fill="#E11D48"/>
  <text x="200" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E11D48">Tax Optimization</text>

  <!-- Optimization arrows pointing to target -->
  <!-- Arrow from left -->
  <line x1="130" y1="105" x2="150" y2="105" stroke="#E11D48" stroke-width="2"/>
  <polygon points="152,105 146,100 146,110" fill="#E11D48"/>

  <!-- Arrow from top -->
  <line x1="200" y1="48" x2="200" y2="55" stroke="#E11D48" stroke-width="2"/>
  <polygon points="200,58 195,50 205,50" fill="#E11D48"/>

  <!-- Arrow from right -->
  <line x1="250" y1="105" x2="270" y2="105" stroke="#E11D48" stroke-width="2"/>
  <polygon points="248,105 254,100 254,110" fill="#E11D48"/>

  <!-- Right side: Strategy cards -->
  <rect x="285" y="48" width="100" height="40" fill="white" stroke="#FDA4AF" stroke-width="1.5" rx="6"/>
  <rect x="290" y="53" width="8" height="8" fill="#E11D48" rx="2"/>
  <text x="303" y="62" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Deductions</text>
  <text x="303" y="78" font-family="sans-serif" font-size="8" fill="#6B7280">Maximize eligible</text>

  <rect x="285" y="95" width="100" height="40" fill="white" stroke="#FDA4AF" stroke-width="1.5" rx="6"/>
  <rect x="290" y="100" width="8" height="8" fill="#E11D48" rx="2"/>
  <text x="303" y="109" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Tax Credits</text>
  <text x="303" y="125" font-family="sans-serif" font-size="8" fill="#6B7280">R&amp;D, Investment</text>

  <rect x="285" y="142" width="100" height="40" fill="white" stroke="#FDA4AF" stroke-width="1.5" rx="6"/>
  <rect x="290" y="147" width="8" height="8" fill="#E11D48" rx="2"/>
  <text x="303" y="156" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Timing</text>
  <text x="303" y="172" font-family="sans-serif" font-size="8" fill="#6B7280">Revenue deferral</text>

  <!-- Bottom section: Before/After comparison -->
  <rect x="20" y="180" width="360" height="100" fill="white" stroke="#FDA4AF" stroke-width="1.5" rx="8"/>
  <text x="200" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#E11D48">Planning Impact</text>

  <!-- Before bar -->
  <text x="35" y="225" font-family="sans-serif" font-size="10" fill="#6B7280">Before</text>
  <rect x="85" y="214" width="220" height="18" fill="#E11D48" rx="4"/>
  <text x="195" y="227" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">Tax: 30,000,000</text>
  <text x="315" y="227" font-family="sans-serif" font-size="10" font-weight="bold" fill="#E11D48">100%</text>

  <!-- After bar -->
  <text x="35" y="255" font-family="sans-serif" font-size="10" fill="#6B7280">After</text>
  <rect x="85" y="244" width="143" height="18" fill="#FDA4AF" rx="4"/>
  <text x="156" y="257" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#9F1239">Tax: 19,500,000</text>
  <text x="238" y="257" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FDA4AF">65%</text>

  <!-- Savings callout -->
  <rect x="245" y="244" width="120" height="18" fill="#E11D48" rx="4"/>
  <text x="305" y="257" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">Save 35%!</text>

  <!-- Down arrow showing savings -->
  <line x1="305" y1="232" x2="305" y2="242" stroke="#E11D48" stroke-width="2"/>
  <polygon points="305,244 300,238 310,238" fill="#E11D48"/>
</svg>
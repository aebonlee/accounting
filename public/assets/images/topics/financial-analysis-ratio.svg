<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" rx="12" fill="#FFFBEB"/>
  <!-- Calculator body -->
  <rect x="40" y="30" width="150" height="240" rx="10" fill="#F59E0B"/>
  <rect x="50" y="40" width="130" height="50" rx="5" fill="#FFFBEB"/>
  <!-- Calculator display text -->
  <text x="170" y="70" font-family="sans-serif" font-size="20" fill="#92400E" font-weight="bold" text-anchor="end">2.45</text>
  <text x="60" y="65" font-family="sans-serif" font-size="10" fill="#B45309">ROE</text>
  <!-- Calculator buttons -->
  <rect x="55" y="100" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="90" y="100" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="125" y="100" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="160" y="100" width="20" height="28" rx="4" fill="#D97706"/>
  <rect x="55" y="135" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="90" y="135" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="125" y="135" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="160" y="135" width="20" height="28" rx="4" fill="#D97706"/>
  <rect x="55" y="170" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="90" y="170" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="125" y="170" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="160" y="170" width="20" height="28" rx="4" fill="#D97706"/>
  <rect x="55" y="205" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="90" y="205" width="28" height="28" rx="4" fill="white"/>
  <rect x="125" y="205" width="28" height="28" rx="4" fill="#FBBF24"/>
  <rect x="160" y="205" width="20" height="28" rx="4" fill="#92400E"/>
  <!-- Button labels -->
  <text x="69" y="119" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">7</text>
  <text x="104" y="119" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">8</text>
  <text x="139" y="119" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">9</text>
  <text x="170" y="119" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">/</text>
  <text x="69" y="154" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">4</text>
  <text x="104" y="154" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">5</text>
  <text x="139" y="154" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">6</text>
  <text x="170" y="154" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">x</text>
  <text x="69" y="189" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">1</text>
  <text x="104" y="189" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">2</text>
  <text x="139" y="189" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">3</text>
  <text x="170" y="189" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">-</text>
  <text x="69" y="224" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">C</text>
  <text x="104" y="224" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">0</text>
  <text x="139" y="224" font-family="sans-serif" font-size="12" fill="#92400E" text-anchor="middle">.</text>
  <text x="170" y="224" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">=</text>
  <!-- Ratio formulas -->
  <rect x="210" y="30" width="170" height="52" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <text x="220" y="50" font-family="sans-serif" font-size="11" fill="#92400E" font-weight="bold">Current Ratio</text>
  <text x="220" y="70" font-family="sans-serif" font-size="10" fill="#B45309">CA / CL = 2.45</text>
  <rect x="210" y="92" width="170" height="52" rx="8" fill="white" stroke="#FBBF24" stroke-width="2"/>
  <text x="220" y="112" font-family="sans-serif" font-size="11" fill="#92400E" font-weight="bold">Debt-to-Equity</text>
  <text x="220" y="132" font-family="sans-serif" font-size="10" fill="#B45309">Debt / Equity = 0.65</text>
  <rect x="210" y="154" width="170" height="52" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <text x="220" y="174" font-family="sans-serif" font-size="11" fill="#92400E" font-weight="bold">ROE</text>
  <text x="220" y="194" font-family="sans-serif" font-size="10" fill="#B45309">NI / Equity = 18.2%</text>
  <!-- Gauge meter 1 -->
  <path d="M270,260 A30,30 0 0,1 330,260" fill="none" stroke="#FDE68A" stroke-width="8" stroke-linecap="round"/>
  <path d="M270,260 A30,30 0 0,1 318,238" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round"/>
  <circle cx="300" cy="260" r="4" fill="#92400E"/>
  <line x1="300" y1="260" x2="315" y2="242" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
  <text x="300" y="280" font-family="sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="bold">Good</text>
  <!-- Gauge meter 2 -->
  <path d="M210,260 A30,30 0 0,1 270,260" fill="none" stroke="#FDE68A" stroke-width="8" stroke-linecap="round"/>
  <path d="M210,260 A30,30 0 0,1 240,232" fill="none" stroke="#FBBF24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="240" cy="260" r="4" fill="#92400E"/>
  <line x1="240" y1="260" x2="248" y2="238" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
  <text x="240" y="280" font-family="sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="bold">Fair</text>
  <!-- Gauge meter 3 -->
  <path d="M330,260 A30,30 0 0,1 390,260" fill="none" stroke="#FDE68A" stroke-width="8" stroke-linecap="round"/>
  <path d="M330,260 A30,30 0 0,1 380,240" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round"/>
  <circle cx="360" cy="260" r="4" fill="#92400E"/>
  <line x1="360" y1="260" x2="377" y2="244" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
  <text x="360" y="280" font-family="sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="bold">Strong</text>
</svg>
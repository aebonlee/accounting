<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFF1F2" rx="10"/>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E11D48">Tax System Structure</text>

  <!-- Top level: Tax System -->
  <rect x="130" y="45" width="140" height="36" fill="#E11D48" rx="6"/>
  <text x="200" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">Tax System</text>

  <!-- Connector lines from top -->
  <line x1="170" y1="81" x2="100" y2="110" stroke="#E11D48" stroke-width="2"/>
  <line x1="230" y1="81" x2="300" y2="110" stroke="#E11D48" stroke-width="2"/>

  <!-- National Tax -->
  <rect x="30" y="110" width="140" height="32" fill="#E11D48" rx="6"/>
  <text x="100" y="131" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">National Tax</text>

  <!-- Local Tax -->
  <rect x="230" y="110" width="140" height="32" fill="#FB7185" rx="6"/>
  <text x="300" y="131" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Local Tax</text>

  <!-- National Tax branches -->
  <line x1="60" y1="142" x2="60" y2="158" stroke="#E11D48" stroke-width="1.5"/>
  <line x1="100" y1="142" x2="100" y2="158" stroke="#E11D48" stroke-width="1.5"/>
  <line x1="140" y1="142" x2="140" y2="158" stroke="#E11D48" stroke-width="1.5"/>

  <!-- National sub-items -->
  <rect x="20" y="158" width="80" height="26" fill="#FECDD3" rx="4"/>
  <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Income Tax</text>

  <rect x="60" y="190" width="80" height="26" fill="#FECDD3" rx="4"/>
  <text x="100" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Corporate Tax</text>

  <rect x="100" y="158" width="80" height="26" fill="#FECDD3" rx="4"/>
  <text x="140" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">VAT</text>

  <!-- More national items -->
  <rect x="20" y="222" width="80" height="26" fill="#FFE4E6" rx="4"/>
  <text x="60" y="239" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E11D48">Inheritance</text>

  <rect x="105" y="222" width="80" height="26" fill="#FFE4E6" rx="4"/>
  <text x="145" y="239" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E11D48">Securities</text>

  <!-- Local Tax branches -->
  <line x1="270" y1="142" x2="270" y2="158" stroke="#FB7185" stroke-width="1.5"/>
  <line x1="330" y1="142" x2="330" y2="158" stroke="#FB7185" stroke-width="1.5"/>

  <!-- Local sub-items -->
  <rect x="230" y="158" width="80" height="26" fill="#FECDD3" rx="4"/>
  <text x="270" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Acquisition</text>

  <rect x="290" y="158" width="80" height="26" fill="#FECDD3" rx="4"/>
  <text x="330" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E11D48">Property</text>

  <rect x="230" y="190" width="80" height="26" fill="#FFE4E6" rx="4"/>
  <text x="270" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E11D48">Resident Tax</text>

  <rect x="290" y="190" width="80" height="26" fill="#FFE4E6" rx="4"/>
  <text x="330" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E11D48">Auto Tax</text>

  <!-- Government icon at top -->
  <polygon points="200,40 210,45 190,45" fill="#9F1239"/>

  <!-- Legend -->
  <rect x="220" y="258" width="12" height="12" fill="#E11D48" rx="2"/>
  <text x="237" y="269" font-family="sans-serif" font-size="10" fill="#4B5563">National</text>
  <rect x="290" y="258" width="12" height="12" fill="#FB7185" rx="2"/>
  <text x="307" y="269" font-family="sans-serif" font-size="10" fill="#4B5563">Local</text>

  <!-- Decorative bracket lines -->
  <line x1="20" y1="252" x2="185" y2="252" stroke="#FDA4AF" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="225" y1="222" x2="375" y2="222" stroke="#FDA4AF" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
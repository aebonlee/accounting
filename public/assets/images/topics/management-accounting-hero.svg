<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#F0FDFA" rx="12"/>

  <!-- Title bar -->
  <rect x="30" y="20" width="740" height="50" fill="#0891B2" rx="8"/>
  <text x="400" y="52" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Management Accounting Dashboard</text>

  <!-- KPI Card 1 - Revenue -->
  <rect x="40" y="90" width="160" height="90" fill="#FFFFFF" rx="8" stroke="#0891B2" stroke-width="2"/>
  <text x="120" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">REVENUE</text>
  <text x="120" y="145" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0891B2">$2.4M</text>
  <text x="120" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#10B981">+12.5%</text>

  <!-- KPI Card 2 - Cost -->
  <rect x="220" y="90" width="160" height="90" fill="#FFFFFF" rx="8" stroke="#0891B2" stroke-width="2"/>
  <text x="300" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">TOTAL COST</text>
  <text x="300" y="145" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0891B2">$1.6M</text>
  <text x="300" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#EF4444">+3.2%</text>

  <!-- KPI Card 3 - Profit -->
  <rect x="400" y="90" width="160" height="90" fill="#FFFFFF" rx="8" stroke="#0891B2" stroke-width="2"/>
  <text x="480" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">PROFIT</text>
  <text x="480" y="145" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0891B2">$0.8M</text>
  <text x="480" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#10B981">+28.1%</text>

  <!-- KPI Card 4 - ROI -->
  <rect x="580" y="90" width="160" height="90" fill="#FFFFFF" rx="8" stroke="#0891B2" stroke-width="2"/>
  <text x="660" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">ROI</text>
  <text x="660" y="145" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0891B2">18.5%</text>
  <text x="660" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#10B981">+4.2%</text>

  <!-- Pie Chart (left) -->
  <rect x="40" y="200" width="230" height="180" fill="#FFFFFF" rx="8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="155" y="225" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">Cost Breakdown</text>
  <!-- Pie slices as circle sectors -->
  <circle cx="130" cy="310" r="55" fill="#0891B2"/>
  <path d="M130,310 L130,255 A55,55 0 0,1 176,283 Z" fill="#22D3EE"/>
  <path d="M130,310 L176,283 A55,55 0 0,1 170,345 Z" fill="#67E8F9"/>
  <path d="M130,310 L170,345 A55,55 0 0,1 130,365 Z" fill="#A5F3FC"/>
  <!-- Pie legend -->
  <rect x="200" y="270" width="10" height="10" fill="#0891B2" rx="2"/>
  <text x="215" y="280" font-family="sans-serif" font-size="10" fill="#374151">Material</text>
  <rect x="200" y="290" width="10" height="10" fill="#22D3EE" rx="2"/>
  <text x="215" y="300" font-family="sans-serif" font-size="10" fill="#374151">Labor</text>
  <rect x="200" y="310" width="10" height="10" fill="#67E8F9" rx="2"/>
  <text x="215" y="320" font-family="sans-serif" font-size="10" fill="#374151">Overhead</text>
  <rect x="200" y="330" width="10" height="10" fill="#A5F3FC" rx="2"/>
  <text x="215" y="340" font-family="sans-serif" font-size="10" fill="#374151">Admin</text>

  <!-- Bar Chart (center) -->
  <rect x="285" y="200" width="230" height="180" fill="#FFFFFF" rx="8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="400" y="225" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">Monthly Trend</text>
  <!-- Bars -->
  <rect x="310" y="290" width="25" height="75" fill="#0891B2" rx="3"/>
  <rect x="345" y="270" width="25" height="95" fill="#0891B2" rx="3"/>
  <rect x="380" y="255" width="25" height="110" fill="#0891B2" rx="3"/>
  <rect x="415" y="240" width="25" height="125" fill="#22D3EE" rx="3"/>
  <rect x="450" y="260" width="25" height="105" fill="#22D3EE" rx="3"/>
  <rect x="485" y="235" width="25" height="130" fill="#22D3EE" rx="3"/>
  <!-- Axis -->
  <line x1="305" y1="365" x2="515" y2="365" stroke="#9CA3AF" stroke-width="1"/>
  <text x="322" y="378" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">Jan</text>
  <text x="357" y="378" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">Feb</text>
  <text x="392" y="378" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">Mar</text>
  <text x="427" y="378" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">Apr</text>
  <text x="462" y="378" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">May</text>
  <text x="497" y="378" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">Jun</text>

  <!-- Decision Panel (right) -->
  <rect x="530" y="200" width="230" height="180" fill="#FFFFFF" rx="8" stroke="#E5E7EB" stroke-width="1"/>
  <text x="645" y="225" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">Decision Support</text>

  <!-- Decision arrows -->
  <rect x="560" y="245" width="170" height="35" fill="#F0FDFA" rx="6" stroke="#0891B2" stroke-width="1.5"/>
  <text x="645" y="267" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0891B2">Analyze Data</text>

  <!-- Arrow down -->
  <polygon points="645,280 638,280 645,295 652,280" fill="#0891B2"/>

  <rect x="560" y="298" width="170" height="35" fill="#F0FDFA" rx="6" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="645" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0891B2">Evaluate Options</text>

  <!-- Arrow down -->
  <polygon points="645,333 638,333 645,348 652,333" fill="#0891B2"/>

  <rect x="560" y="350" width="170" height="28" fill="#0891B2" rx="6"/>
  <text x="645" y="369" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Make Decision</text>
</svg>
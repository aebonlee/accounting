<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#F5F3FF"/>

  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#8B5CF6">Double-Entry Bookkeeping</text>

  <!-- Debit Column -->
  <rect x="40" y="55" width="140" height="190" rx="8" fill="#8B5CF6"/>
  <text x="110" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">DEBIT</text>
  <rect x="52" y="92" width="116" height="28" rx="4" fill="#A78BFA"/>
  <text x="110" y="111" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">Cash +10,000</text>
  <rect x="52" y="126" width="116" height="28" rx="4" fill="#A78BFA"/>
  <text x="110" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">Equipment +5,000</text>
  <rect x="52" y="160" width="116" height="28" rx="4" fill="#A78BFA"/>
  <text x="110" y="179" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">Rent Exp +2,000</text>
  <!-- Debit total -->
  <line x1="52" y1="200" x2="168" y2="200" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="110" y="222" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">17,000</text>

  <!-- Credit Column -->
  <rect x="220" y="55" width="140" height="190" rx="8" fill="#A78BFA"/>
  <text x="290" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">CREDIT</text>
  <rect x="232" y="92" width="116" height="28" rx="4" fill="#8B5CF6"/>
  <text x="290" y="111" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">Revenue +10,000</text>
  <rect x="232" y="126" width="116" height="28" rx="4" fill="#8B5CF6"/>
  <text x="290" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">Loan Pay +5,000</text>
  <rect x="232" y="160" width="116" height="28" rx="4" fill="#8B5CF6"/>
  <text x="290" y="179" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFFFFF">Cash -2,000</text>
  <!-- Credit total -->
  <line x1="232" y1="200" x2="348" y2="200" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="290" y="222" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">17,000</text>

  <!-- Balance arrows -->
  <!-- Top arrow: Debit to Credit -->
  <line x1="185" y1="110" x2="215" y2="110" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="215,106 225,110 215,114" fill="#8B5CF6"/>
  <!-- Bottom arrow: Credit to Debit -->
  <line x1="215" y1="150" x2="185" y2="150" stroke="#A78BFA" stroke-width="2"/>
  <polygon points="185,146 175,150 185,154" fill="#A78BFA"/>

  <!-- Equals / Balance indicator -->
  <rect x="150" y="255" width="100" height="30" rx="15" fill="#8B5CF6"/>
  <text x="200" y="275" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">BALANCED</text>

  <!-- Check mark circle -->
  <circle cx="270" cy="270" r="12" fill="#A78BFA"/>
  <polyline points="264,270 268,275 278,264" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
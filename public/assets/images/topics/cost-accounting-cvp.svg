<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFF7ED" rx="8"/>

  <!-- Title -->
  <text x="200" y="24" font-family="sans-serif" font-size="16" fill="#92400E" text-anchor="middle" font-weight="bold">CVP Analysis</text>

  <!-- Chart Area -->
  <!-- Y-axis -->
  <line x1="60" y1="40" x2="60" y2="240" stroke="#92400E" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="60" y1="240" x2="370" y2="240" stroke="#92400E" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="18" y="140" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle" transform="rotate(-90,18,140)" font-weight="bold">Dollars ($)</text>

  <!-- X-axis label -->
  <text x="215" y="258" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="bold">Units Sold</text>

  <!-- Y-axis ticks and labels -->
  <line x1="55" y1="200" x2="60" y2="200" stroke="#92400E" stroke-width="1"/>
  <text x="50" y="204" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="end">$20K</text>

  <line x1="55" y1="160" x2="60" y2="160" stroke="#92400E" stroke-width="1"/>
  <text x="50" y="164" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="end">$40K</text>

  <line x1="55" y1="120" x2="60" y2="120" stroke="#92400E" stroke-width="1"/>
  <text x="50" y="124" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="end">$60K</text>

  <line x1="55" y1="80" x2="60" y2="80" stroke="#92400E" stroke-width="1"/>
  <text x="50" y="84" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="end">$80K</text>

  <!-- X-axis ticks -->
  <line x1="120" y1="240" x2="120" y2="245" stroke="#92400E" stroke-width="1"/>
  <text x="120" y="254" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="middle">200</text>

  <line x1="180" y1="240" x2="180" y2="245" stroke="#92400E" stroke-width="1"/>
  <text x="180" y="254" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="middle">400</text>

  <line x1="240" y1="240" x2="240" y2="245" stroke="#92400E" stroke-width="1"/>
  <text x="240" y="254" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="middle">600</text>

  <line x1="300" y1="240" x2="300" y2="245" stroke="#92400E" stroke-width="1"/>
  <text x="300" y="254" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="middle">800</text>

  <line x1="360" y1="240" x2="360" y2="245" stroke="#92400E" stroke-width="1"/>
  <text x="360" y="254" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="middle">1000</text>

  <!-- Grid lines (subtle) -->
  <line x1="60" y1="200" x2="370" y2="200" stroke="#FDE68A" stroke-width="0.5"/>
  <line x1="60" y1="160" x2="370" y2="160" stroke="#FDE68A" stroke-width="0.5"/>
  <line x1="60" y1="120" x2="370" y2="120" stroke="#FDE68A" stroke-width="0.5"/>
  <line x1="60" y1="80" x2="370" y2="80" stroke="#FDE68A" stroke-width="0.5"/>

  <!-- Fixed Cost Line (horizontal) -->
  <line x1="60" y1="200" x2="360" y2="200" stroke="#B45309" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Total Cost Line: starts at Fixed Cost ($20K=y200), slopes up -->
  <!-- FC=20K at 0 units, TC at 1000 units = 20K + 60K = 80K (y=80) -->
  <line x1="60" y1="200" x2="360" y2="80" stroke="#D97706" stroke-width="2.5"/>

  <!-- Total Revenue Line: starts at origin, slopes up steeper -->
  <!-- Revenue at 1000 units = $100K (above chart), at 800 = 80K (y=80) -->
  <!-- Revenue = $100/unit, so at 0=$0(y240), at 1000=$100K. Scale: y per $20K = 40px -->
  <!-- At 200 units: $20K (y200), at 400: $40K (y160), at 600: $60K (y120), at 800: $80K (y80) -->
  <line x1="60" y1="240" x2="360" y2="40" stroke="#FBBF24" stroke-width="2.5"/>

  <!-- Loss Area (shaded) - triangle between TC and Revenue lines before BEP -->
  <polygon points="60,200 60,240 200,140" fill="#FEE2E2" opacity="0.5"/>

  <!-- Profit Area (shaded) - triangle between Revenue and TC after BEP -->
  <polygon points="200,140 360,80 360,40" fill="#DCFCE7" opacity="0.5"/>

  <!-- Break-Even Point -->
  <!-- BEP: where Revenue = Total Cost -->
  <!-- Revenue: y = 240 - (200/1000)*x_px... Let me calculate: -->
  <!-- Revenue line: from (60,240) to (360,40). At x_px, y = 240 - (200/300)*(x_px-60) -->
  <!-- TC line: from (60,200) to (360,80). At x_px, y = 200 - (120/300)*(x_px-60) -->
  <!-- BEP: 240 - (2/3)(x-60) = 200 - (2/5)(x-60) -->
  <!-- 40 = (2/3 - 2/5)(x-60) = (4/15)(x-60) -->
  <!-- x-60 = 150, x = 210 px -->
  <!-- y at BEP: 200 - (2/5)*150 = 200 - 60 = 140 -->
  <circle cx="200" cy="140" r="7" fill="white" stroke="#92400E" stroke-width="2.5"/>
  <circle cx="200" cy="140" r="3" fill="#92400E"/>

  <!-- BEP dashed lines to axes -->
  <line x1="200" y1="140" x2="200" y2="240" stroke="#92400E" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="60" y1="140" x2="200" y2="140" stroke="#92400E" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- BEP Label -->
  <rect x="158" y="120" width="85" height="16" fill="#92400E" rx="3"/>
  <text x="200" y="131" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Break-Even Point</text>

  <!-- Area Labels -->
  <text x="110" y="225" font-family="sans-serif" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="bold">LOSS</text>
  <text x="310" y="75" font-family="sans-serif" font-size="10" fill="#16A34A" text-anchor="middle" font-weight="bold">PROFIT</text>

  <!-- Legend -->
  <line x1="70" y1="272" x2="90" y2="272" stroke="#FBBF24" stroke-width="2.5"/>
  <text x="95" y="276" font-family="sans-serif" font-size="8" fill="#92400E">Total Revenue</text>

  <line x1="170" y1="272" x2="190" y2="272" stroke="#D97706" stroke-width="2.5"/>
  <text x="195" y="276" font-family="sans-serif" font-size="8" fill="#92400E">Total Cost</text>

  <line x1="260" y1="272" x2="280" y2="272" stroke="#B45309" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="285" y="276" font-family="sans-serif" font-size="8" fill="#92400E">Fixed Cost</text>

  <!-- Formulas -->
  <text x="200" y="293" font-family="sans-serif" font-size="7" fill="#B45309" text-anchor="middle">BEP (units) = Fixed Costs / (Selling Price - Variable Cost per Unit)</text>
</svg>
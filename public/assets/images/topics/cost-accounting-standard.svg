<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFF7ED" rx="8"/>

  <!-- Title -->
  <text x="200" y="28" font-family="sans-serif" font-size="16" fill="#92400E" text-anchor="middle" font-weight="bold">Standard Costing</text>

  <!-- Bullseye / Target -->
  <circle cx="130" cy="140" r="80" fill="#FDE68A"/>
  <circle cx="130" cy="140" r="60" fill="#FCD34D"/>
  <circle cx="130" cy="140" r="40" fill="#D97706"/>
  <circle cx="130" cy="140" r="20" fill="#92400E"/>
  <circle cx="130" cy="140" r="6" fill="white"/>

  <!-- Standard label on center -->
  <text x="130" y="145" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">STD</text>

  <!-- Variance arrows pointing away from target -->
  <!-- Favorable (pointing inward / close to center) -->
  <line x1="220" y1="95" x2="175" y2="115" stroke="#16A34A" stroke-width="2.5"/>
  <polygon points="178,110 172,118 182,117" fill="#16A34A"/>
  <text x="228" y="93" font-family="sans-serif" font-size="9" fill="#16A34A" font-weight="bold">Favorable</text>
  <text x="228" y="103" font-family="sans-serif" font-size="8" fill="#16A34A">Under budget</text>

  <!-- Unfavorable (pointing outward / far from center) -->
  <line x1="175" y1="170" x2="225" y2="190" stroke="#DC2626" stroke-width="2.5"/>
  <polygon points="222,185 228,193 220,192" fill="#DC2626"/>
  <text x="232" y="188" font-family="sans-serif" font-size="9" fill="#DC2626" font-weight="bold">Unfavorable</text>
  <text x="232" y="198" font-family="sans-serif" font-size="8" fill="#DC2626">Over budget</text>

  <!-- Ring labels -->
  <text x="130" y="68" font-family="sans-serif" font-size="7" fill="#92400E" text-anchor="middle">Actual Cost Zone</text>

  <!-- Variance Analysis Table -->
  <rect x="20" y="230" width="360" height="60" fill="white" rx="4" stroke="#D97706" stroke-width="1.5"/>

  <!-- Table Header -->
  <rect x="20" y="230" width="360" height="18" fill="#D97706" rx="4"/>
  <rect x="20" y="240" width="360" height="8" fill="#D97706"/>
  <text x="68" y="243" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Variance Type</text>
  <text x="168" y="243" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Standard</text>
  <text x="248" y="243" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Actual</text>
  <text x="338" y="243" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Variance</text>

  <!-- Row dividers -->
  <line x1="120" y1="230" x2="120" y2="290" stroke="#FCD34D" stroke-width="0.5"/>
  <line x1="210" y1="230" x2="210" y2="290" stroke="#FCD34D" stroke-width="0.5"/>
  <line x1="290" y1="230" x2="290" y2="290" stroke="#FCD34D" stroke-width="0.5"/>

  <!-- Material Row -->
  <text x="68" y="261" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">Material Price</text>
  <text x="168" y="261" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">$5.00/unit</text>
  <text x="248" y="261" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">$5.30/unit</text>
  <text x="338" y="261" font-family="sans-serif" font-size="8" fill="#DC2626" text-anchor="middle" font-weight="bold">$0.30 U</text>

  <line x1="30" y1="265" x2="370" y2="265" stroke="#FDE68A" stroke-width="0.5"/>

  <!-- Labor Row -->
  <text x="68" y="278" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">Labor Efficiency</text>
  <text x="168" y="278" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">2.0 hrs</text>
  <text x="248" y="278" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">1.8 hrs</text>
  <text x="338" y="278" font-family="sans-serif" font-size="8" fill="#16A34A" text-anchor="middle" font-weight="bold">0.2 hrs F</text>

  <!-- Right side: Standard Cost Card -->
  <rect x="260" y="60" width="120" height="105" fill="white" rx="4" stroke="#FCD34D" stroke-width="2"/>
  <rect x="260" y="60" width="120" height="20" fill="#FCD34D" rx="4"/>
  <rect x="260" y="72" width="120" height="8" fill="#FCD34D"/>
  <text x="320" y="74" font-family="sans-serif" font-size="9" fill="#92400E" text-anchor="middle" font-weight="bold">Standard Cost Card</text>

  <text x="272" y="97" font-family="sans-serif" font-size="8" fill="#92400E">DM:</text>
  <text x="368" y="97" font-family="sans-serif" font-size="8" fill="#D97706" text-anchor="end">$10.00</text>

  <text x="272" y="113" font-family="sans-serif" font-size="8" fill="#92400E">DL:</text>
  <text x="368" y="113" font-family="sans-serif" font-size="8" fill="#D97706" text-anchor="end">$24.00</text>

  <text x="272" y="129" font-family="sans-serif" font-size="8" fill="#92400E">VOH:</text>
  <text x="368" y="129" font-family="sans-serif" font-size="8" fill="#D97706" text-anchor="end">$8.00</text>

  <line x1="270" y1="135" x2="370" y2="135" stroke="#D97706" stroke-width="1"/>

  <text x="272" y="150" font-family="sans-serif" font-size="9" fill="#92400E" font-weight="bold">Total:</text>
  <text x="368" y="150" font-family="sans-serif" font-size="9" fill="#D97706" text-anchor="end" font-weight="bold">$42.00</text>

  <!-- Formula note -->
  <text x="320" y="178" font-family="sans-serif" font-size="7" fill="#B45309" text-anchor="middle">Variance = Actual - Standard</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#F0F5FF" rx="10"/>

  <!-- Lightbulb -->
  <circle cx="140" cy="100" r="50" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="2.5"/>
  <path d="M120 100 Q120 70 140 60 Q160 70 160 100" fill="none" stroke="#1D4ED8" stroke-width="3"/>
  <rect x="128" y="148" width="24" height="8" fill="#1D4ED8" rx="2"/>
  <rect x="131" y="158" width="18" height="6" fill="#3B82F6" rx="2"/>
  <rect x="134" y="166" width="12" height="4" fill="#3B82F6" rx="2"/>
  <!-- Filament -->
  <path d="M134 110 L140 95 L146 110" fill="none" stroke="#1D4ED8" stroke-width="2.5"/>
  <!-- Light rays -->
  <line x1="140" y1="38" x2="140" y2="28" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="55" x2="98" y2="48" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="175" y1="55" x2="182" y2="48" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="85" x2="80" y2="82" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="190" y1="85" x2="200" y2="82" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>

  <!-- Connection lines from lightbulb to documents -->
  <path d="M190 100 Q220 100 240 80" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M190 110 Q230 130 250 150" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M170 145 Q210 200 245 220" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Document 1 - Financial Report -->
  <rect x="240" y="40" width="80" height="100" fill="#FFFFFF" rx="6" stroke="#1D4ED8" stroke-width="2"/>
  <rect x="252" y="54" width="56" height="6" fill="#DBEAFE" rx="2"/>
  <rect x="252" y="66" width="40" height="4" fill="#BFDBFE" rx="2"/>
  <rect x="252" y="76" width="50" height="4" fill="#BFDBFE" rx="2"/>
  <rect x="252" y="86" width="35" height="4" fill="#BFDBFE" rx="2"/>
  <!-- Mini chart on document -->
  <rect x="255" y="100" width="10" height="25" fill="#1D4ED8" rx="2"/>
  <rect x="270" y="110" width="10" height="15" fill="#3B82F6" rx="2"/>
  <rect x="285" y="95" width="10" height="30" fill="#1D4ED8" rx="2"/>

  <!-- Document 2 - Ledger -->
  <rect x="250" y="155" width="100" height="70" fill="#FFFFFF" rx="6" stroke="#1D4ED8" stroke-width="2"/>
  <line x1="260" y1="172" x2="340" y2="172" stroke="#DBEAFE" stroke-width="1.5"/>
  <line x1="300" y1="165" x2="300" y2="215" stroke="#DBEAFE" stroke-width="1.5"/>
  <text x="275" y="168" font-family="sans-serif" font-size="8" fill="#1D4ED8" font-weight="bold">Dr</text>
  <text x="315" y="168" font-family="sans-serif" font-size="8" fill="#1D4ED8" font-weight="bold">Cr</text>
  <text x="270" y="188" font-family="sans-serif" font-size="9" fill="#3B82F6">500</text>
  <text x="310" y="200" font-family="sans-serif" font-size="9" fill="#3B82F6">500</text>

  <!-- Document 3 - Statement -->
  <rect x="240" y="235" width="90" height="50" fill="#FFFFFF" rx="6" stroke="#1D4ED8" stroke-width="2"/>
  <rect x="252" y="246" width="66" height="5" fill="#DBEAFE" rx="2"/>
  <rect x="252" y="256" width="45" height="4" fill="#BFDBFE" rx="2"/>
  <rect x="252" y="265" width="55" height="4" fill="#BFDBFE" rx="2"/>
  <rect x="252" y="274" width="35" height="4" fill="#BFDBFE" rx="2"/>

  <!-- Small dots for connection emphasis -->
  <circle cx="240" cy="80" r="4" fill="#1D4ED8"/>
  <circle cx="250" cy="155" r="4" fill="#1D4ED8"/>
  <circle cx="245" cy="225" r="4" fill="#1D4ED8"/>

  <!-- Label -->
  <text x="80" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Understanding</text>
  <text x="80" y="238" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Accounting</text>
  <text x="80" y="256" font-family="sans-serif" font-size="12" fill="#3B82F6" text-anchor="middle">Purpose</text>
</svg>